<style>
  :root{
    --bg:#ffffff;
    --text:#111827;
    --surface:#ffffff;
    --surface-muted:#f9fafb;
    --surface-soft:#f3f4f6;
    --border:#cbd5e1;
    --border-strong:#94a3b8;
    --muted:#6b7280;
    --primary:#111827;
    --primary-contrast:#ffffff;
    --secondary:#6b7280;
    --link:#2563eb;
    --danger:#b91c1c;
    --success:#059669;
    --warning:#b45309;
    --shadow:0 15px 40px rgba(0,0,0,0.18);
    --overlay:rgba(0,0,0,0.45);
    --row-hover:#eef2ff;
    --visualizar-print-width:277mm;
  }
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#111827;
    --text:#e5e7eb;
    --surface:#111827;
    --surface-muted:#1f2937;
    --surface-soft:#334155;
    --border:#334155;
    --border-strong:#475569;
    --muted:#cbd5e1;
    --primary:#60a5fa;
    --primary-contrast:#f8fafc;
    --secondary:#475569;
    --link:#60a5fa;
    --danger:#fca5a5;
    --success:#34d399;
    --warning:#fbbf24;
    --shadow:0 15px 40px rgba(0,0,0,0.5);
    --overlay:rgba(2,6,23,0.7);
    --row-hover:#273449;
  }
  html[data-theme="dark"]{
    scrollbar-color:#94a3b8 transparent;
  }
  html[data-theme="dark"] ::-webkit-scrollbar-track{
    background:transparent;
  }
  body{font-family:Arial,Helvetica,sans-serif;margin:0;min-height:100vh;display:flex;flex-direction:column;padding:0 24px;width:min(1200px,100%);margin-inline:auto;background:var(--bg);color:var(--text);box-sizing:border-box}
  h1,h2,h3,h4,h5,h6{color:var(--text)}
  .card{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;background:var(--surface)}
  h1{margin:0 0 12px}
  h2{margin:12px 0 8px}
  .section-title{text-align:left;}
  label{display:block;font-size:12px;color:var(--text);margin:8px 0 4px}
  input,select,textarea{width:100%;padding:10px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface);color:var(--text)}
  textarea{min-height:38px;resize:vertical}
  button{padding:10px 14px;border:0;border-radius:8px;cursor:pointer}
  .btn{background:var(--primary);color:var(--primary-contrast)}.btn-grey{background:var(--secondary);color:var(--primary-contrast)}
    .btn-small{padding:7px 10px;font-size:12px;line-height:1.3}
  .muted{color:var(--muted)}.hidden{display:none}.err{color:var(--danger)}
  .row{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
  .col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-12{grid-column:span 12}
  small{color:var(--muted)}
  .msg a{ text-decoration: underline; }
  .header-3col{display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
  .header-3col h1{grid-column:2;text-align:center;margin:0}
  .header-3col .left{grid-column:1}
  .logo-wrap{display:flex;justify-content:center;margin-bottom:4px}
  .logo-img{max-width:520px;max-height:220px;width:100%;height:auto;object-fit:contain;display:block}
  .home-header{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:12px}
  .home-actions{display:flex;flex-direction:column;align-items:flex-end;justify-self:end;gap:6px}
  .home-actions-row{display:grid;grid-template-columns:repeat(2,44px);justify-content:end;gap:6px}
  .home-actions-row > button{margin-left:0 !important;white-space:nowrap}
  .home-icon-btn{width:44px;height:36px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:18px;line-height:1;font-weight:500}
  .home-theme-btn{align-self:auto}
  .home-add-btn{width:94px}
  .home-logo{margin:0;justify-self:center}
  .login-logo{max-width:360px}
  .login-aviso-bloco{max-height:calc(1.4em * 6);overflow-y:auto;padding-right:8px}
  .login-aviso-bloco p{margin:0 0 6px;line-height:1.4}
  .login-aviso-bloco p:last-child{margin-bottom:0}
  .home-light-logo{max-width:150px}
  .home-dark-logo{max-width:150px}


  /* Tabela dashboard */
  .table-wrap{--table-sticky-gap:8px;overflow:auto;position:relative}
  .table-wrap::before{content:'';position:sticky;top:0;display:block;height:var(--table-sticky-gap);background:var(--surface);z-index:2;pointer-events:none}
  table{border-collapse:collapse;width:100%;min-width:1750px;table-layout:fixed}
  thead th{position:sticky;top:var(--table-sticky-gap);background:var(--primary);color:var(--primary-contrast);padding:10px;font-weight:600;text-align:center;word-break:break-word;z-index:4}
  thead tr.filters-row th{top:calc(44px + var(--table-sticky-gap));background:var(--surface-muted);color:var(--text);padding:6px;text-align:center;z-index:3}
  .column-filter{width:100%;padding:6px 8px;border:1px solid var(--border-strong);border-radius:6px;font-size:12px;box-sizing:border-box;background:var(--surface);color:var(--text)}
  .filter-btn-group{display:inline-flex;gap:6px;align-items:center;justify-content:center;width:100%}
  .filter-btn{padding:6px 8px;border-radius:6px;font-size:11px;line-height:1.2;border:1px solid transparent;cursor:pointer;min-width:32px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .filter-btn-active{background:var(--primary);color:var(--primary-contrast);border-color:var(--primary)}
  .filter-btn-inactive{background:var(--secondary);color:var(--primary-contrast);border-color:var(--secondary)}
  .filter-btn:hover{opacity:0.92}
  .filter-icon{width:14px;height:14px;display:inline-block;background:currentColor;-webkit-mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" stroke="black"><path d="M4 4h16l-6.5 7v6.5l-3 2.5V11z"/></svg>') center/contain no-repeat;mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" stroke="black"><path d="M4 4h16l-6.5 7v6.5l-3 2.5V11z"/></svg>') center/contain no-repeat}
  .calendar-icon{width:14px;height:14px;display:inline-block;background:currentColor;-webkit-mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" stroke="black"><rect x="3" y="5" width="18" height="16" rx="2" ry="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>') center/contain no-repeat;mask:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" stroke="black"><rect x="3" y="5" width="18" height="16" rx="2" ry="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>') center/contain no-repeat}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(1),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(2),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(3),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(4),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(5),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(6),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(10),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(11),
  :is(#devTbl,#tbl,#finTbl) tbody td:nth-child(12){text-align:center}
  :is(#devTbl,#tbl,#finTbl) tbody td{border-bottom:1px solid var(--border);padding:8px;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:27px;line-height:16px}
  tbody tr:hover{background:var(--row-hover)}
  .nowrap{white-space:nowrap}

  :is(#devTbl,#tbl,#finTbl) tbody td.is-truncated{cursor:help}
  .home-cell-tooltip{position:fixed;left:0;top:0;max-width:min(420px,70vw);padding:10px 12px;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:0;box-shadow:0 4px 12px rgba(0,0,0,.18);white-space:normal;word-break:break-word;line-height:1.35;z-index:9999;pointer-events:none}
  .home-cell-tooltip.hidden{display:none}
  .link{color:var(--link);text-decoration:underline;cursor:pointer}

  /* Responder: layout em 2 metades (50% + 50%) */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .panel{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--surface)}
  @media (max-width: 1100px){
    .split{grid-template-columns:1fr}
  }

  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .chip{display:inline-block;padding:2px 8px;border:1px solid var(--border-strong);border-radius:999px;font-size:12px;margin-right:6px}

  /* Campos compactos lado-a-lado (rótulo + textarea) */
  .inline-field{display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:center}
  .inline-field label{margin:0}
  .inline-field textarea{min-height:28px;padding:6px}

  /* Textareas auto-redimensionáveis (altura) */
  .autoresize{resize:none;overflow:hidden}

  /* Pré-estado de impressão para medir alturas no mesmo layout do print */
  #view-visualizar.is-printing{
    width:var(--visualizar-print-width) !important;
    max-width:var(--visualizar-print-width) !important;
    font-size:11px;
    line-height:1.2;
  }
  #view-visualizar.is-printing .split{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    align-items:start;
    width:100%;
  }
  #view-visualizar.is-printing .panel{
    margin:0 !important;
    padding:6px !important;
  }
  #view-visualizar.is-printing textarea{
    overflow:hidden !important;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  #view-visualizar.is-printing textarea::-webkit-scrollbar{
    display:none;
  }

  /* Linhas de Solução: Ação + metadados (Responsável/Prazo empilhados) */
  .grid-sln{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:12px;align-items:start}
  .grid-sln-meta{display:grid;grid-template-columns:1fr;gap:8px}
  .grid-sln-meta > div > label{padding-left:3ch}

  /* Espaçamento enxuto entre porquês */
  .stack-why .inline-field{margin-bottom:6px}
  
  /* Checkbox alinhado com texto */
  .checkbox-inline{display:inline-flex;align-items:center;gap:8px}
  .checkbox-inline input[type="checkbox"]{margin:0}

  .retorno-msg{background:var(--surface-soft);border:1px solid var(--border-strong);border-radius:10px;padding:10px;color:var(--danger);margin-bottom:10px;font-size:13px;line-height:1.4}

  .toggle-btn{min-width:32px}

  /* Dashboard resumo */
  #view-home{border:0;margin-bottom:0;padding-bottom:0;flex:1;margin-top:24px}
  #view-home:not(.hidden){display:flex;flex-direction:column}
  .dashboard-wrap{border:0;border-radius:12px;padding:12px;margin-top:8px}
    #home-blocks{display:flex;flex-direction:column;gap:18px;margin-top:12px;margin-bottom: 120px}
  #home-blocks > div{border:1px solid var(--border);border-radius:12px;padding:0 12px 12px;background:var(--surface)}

  html[data-theme="dark"] :is(#devTbl,#tbl,#finTbl) thead tr:first-child th{
    background:var(--secondary);
    border-bottom:1px solid var(--border-strong);
  }
  :is(#devTbl,#tbl,#finTbl) thead tr.filters-row th{
    background:var(--bg);
  }
  .dashboard-filter-card{padding:12px;border:0;background:transparent}
  .dashboard-filter{display:flex;justify-content:flex-start;align-items:center;gap:12px;flex-wrap:wrap}
  .dashboard-filter-title{margin:0;font-size:16px}
  .dashboard-filter .filter-btn-group{justify-content:flex-start;width:auto}
  .date-range-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-soft);border:1px solid var(--border);border-radius:999px;padding:6px 10px;flex-wrap:wrap}
  .date-range-label{font-size:12px;color:var(--text);font-weight:600}
  .date-range-input{border:0;background:transparent;padding:6px 4px;min-width:140px;max-width:180px;font-size:12px;line-height:1.2;height:32px}
  .date-range-input:focus{outline:none}
  .date-range-sep{color:var(--muted);font-size:12px}
  .dashboard-filter .btn-small{white-space:nowrap}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:start}
  .kpi-row{grid-template-columns:repeat(4,minmax(0,1fr))}
  .kpi-card{border:1px solid var(--border);border-radius:10px;padding:8px 10px;background:var(--surface-muted);display:flex;flex-direction:column;gap:4px;min-height:72px;align-items:center;text-align:center}
  .kpi-label{font-size:13px;color:var(--muted)}
  .kpi-value{font-size:24px;font-weight:700;color:var(--text);line-height:1.1}
  .kpi-sub{font-size:12px;color:var(--muted);line-height:1.3}
  .kpi-value.good{color:var(--success)}
  .kpi-value.bad{color:var(--danger)}
  .home-footer{--home-footer-bg:#e8e9eb;position:relative;isolation:isolate;margin:16px -16px 0;padding:8px 16px;background:transparent;color:#545963;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;column-gap:12px;font-size:12px;line-height:1;min-height:30px;margin-top:auto}
  .home-footer::before{content:"";position:absolute;inset:0;background:var(--home-footer-bg);box-shadow:0 0 0 100vmax var(--home-footer-bg);clip-path:inset(0 -100vmax);z-index:-1}
  html[data-theme="dark"] .home-footer{--home-footer-bg:#0d121c;color:#8790a1}
  .home-footer span:nth-child(2){text-align:center}
  .home-footer span:nth-child(3){text-align:right}
  .chart-canvas{width:100%;max-width:100%;height:220px;max-height:240px}

  /* Modal de filtros estilo Excel */
  .filter-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:10000}
  .filter-overlay.hidden{display:none !important}
  .filter-backdrop{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:var(--overlay);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
  }
  .filter-dialog{position:relative;background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:16px;width:360px;max-height:70vh;overflow-y:auto;overflow-x:hidden;z-index:1;display:flex;flex-direction:column;gap:12px;align-items:flex-start;text-align:left;box-sizing:border-box}
  .filter-header{display:flex;align-items:center;justify-content:center;gap:12px;position:relative;width:100%}
  .filter-title{font-weight:700;font-size:16px;margin:0;flex:1;text-align:center}
  .filter-close{position:absolute;right:0;top:50%;transform:translateY(-50%)}
  .filter-body{display:flex;flex-direction:column;gap:8px;align-items:flex-start;width:100%;text-align:left;box-sizing:border-box}
  .filter-options{border:1px solid var(--border);border-radius:8px;padding:8px;max-height:240px;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:8px;align-items:stretch;width:100%;text-align:left;box-sizing:border-box}
  .filter-search-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text);font-size:13px}
  .filter-search-input::placeholder{color:var(--muted)}
  .filter-option{display:grid;grid-template-columns:auto 1fr;align-items:flex-start;justify-items:flex-start;gap:8px;font-size:13px;width:100%;text-align:left}
  .filter-option input[type="checkbox"]{margin:2px 4px 0 0;justify-self:start}
  .filter-option-label{padding-left:2px;flex:1;text-align:left;justify-self:start}
  .filter-actions{display:flex;justify-content:flex-end;gap:8px;width:100%;box-sizing:border-box}
  .filter-dialog :is(input,select,textarea){box-sizing:border-box}

  .modal{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:9999}
  .modal.hidden{display:none !important}
  .modal-backdrop{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:var(--overlay);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
  }
  .modal-dialog{position:relative;background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:16px;width:90%;max-width:900px;max-height:90vh;overflow:auto;z-index:1}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .modal-body{min-height:300px}
  .modal-close{min-width:32px}
  .logout-loading-dialog{
    position:relative;
    z-index:1;
    width:72px;
    height:72px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--surface);
    box-shadow:var(--shadow);
  }
  .logout-spinner{
    width:34px;
    height:34px;
    border:4px solid var(--border);
    border-top-color:var(--primary);
    border-radius:50%;
    animation:logout-spin 0.9s linear infinite;
  }
  @keyframes logout-spin{
    to{ transform:rotate(360deg); }
  }
  .pa-validacao-list{display:flex;flex-direction:column;gap:10px}
  .pa-validacao-item{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:10px;padding:10px}
  .pa-validacao-item.pa-validacao-item-disabled{background:var(--surface-muted);opacity:0.9}
  .pa-validacao-item.pa-validacao-item-disabled label{cursor:not-allowed;color:var(--muted)}
  .pa-validacao-item input[type="checkbox"]{margin-top:4px}
  .pa-validacao-acao{font-weight:700;color:var(--text)}
  .pa-validacao-meta{font-size:12px;color:var(--muted);line-height:1.4}
  .pa-validacao-status{font-size:12px;color:var(--muted);margin-top:4px}
  .pa-validacao-status-ok{color:var(--success)}
  .pa-validacao-status-pendente{color:var(--warning)}

/* AJUSTE: reforço para clique confiável em inputs de arquivo */
input[type="file"] {
  cursor: pointer;
  opacity: 1 !important;
  pointer-events: auto !important;
}

  .theme-toggle{min-width:0;padding:0;line-height:1}
  .theme-toggle-icon{display:inline-block;line-height:1}

  html[data-theme="dark"] .btn{color:#0f172a;font-weight:600}
  .logo-dark{display:none}
  html[data-theme="dark"] .logo-light{display:none}
  html[data-theme="dark"] .logo-dark{display:block}

  @media print {
    @page {
      size: landscape;
      /* Menor margem vertical, preservando as laterais */
      margin: 9mm 9mm 9mm;
    }

    html, body{
      margin:0 !important;
      padding:0 !important;
      height:auto;
      overflow:visible !important;
      background:#fff !important;
      color-scheme:light !important;
    }

    /* Imprimir somente os blocos CONSTATAÇÃO e RESPOSTA */
    body *{visibility:hidden}
    #view-visualizar, #view-visualizar *{visibility:visible}
    #view-visualizar > :not(.split){display:none !important}
    #view-visualizar{
      position:static !important;
      width:var(--visualizar-print-width) !important;
      max-width:var(--visualizar-print-width) !important;
      border:0 !important;
      box-shadow:none !important;
      margin:0 !important;
      padding:0 !important;
      font-size:11px;
      line-height:1.2;
      color:#000 !important;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
      background:#fff !important;
    }
    #view-visualizar, #view-visualizar *{box-sizing:border-box}
    #view-visualizar :is(h1,h2,h3,h4,h5,h6,label,small,p,span,div,input,textarea,button){
      color:#000 !important;
      -webkit-text-fill-color:#000 !important;
    }
    #view-visualizar .muted{
      color:#000 !important;
    }
    #view-visualizar :is(.panel,input,textarea,select){
      border-color:#9ca3af !important;
      background:#fff !important;
    }

    /* Visualização: imprimir em 2 colunas na mesma página */
    #view-visualizar .split{
      display:grid !important;
      grid-template-columns:1fr 1fr;
      gap:8px;
      align-items:start;
      margin:0;
      padding:0;
      width:100%;
    }
    #view-visualizar .panel{
      break-inside:avoid-page;
      page-break-inside:avoid;
      margin:0 !important;
      padding:6px !important;
    }
    #view-visualizar .panel-resposta{
      break-before:auto;
      page-break-before:auto;
      margin-top:0;
    }

    /* Sem resposta/conclusão: imprime só a CONSTATAÇÃO, mantendo coluna à esquerda */
    #view-visualizar .split.print-left-only .panel-resposta{display:none !important}
    #view-visualizar .split.print-left-only .panel-constatacao{grid-column:1 / 2}

    #view-visualizar textarea{
      overflow:hidden !important;
      scrollbar-width:none;
      -ms-overflow-style:none;
      max-height:none !important;
    }
    #view-visualizar textarea::-webkit-scrollbar{
      display:none;
    }
    #view-visualizar textarea.autoresize{
      max-height:none !important;
    }
  }


</style>
