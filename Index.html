<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teste Baldi</title>
    <script>
      (function () {
        const THEME_KEY = 'baldi-theme';
        const storedTheme = localStorage.getItem(THEME_KEY);
        const initialTheme = (storedTheme === 'light' || storedTheme === 'dark')
          ? storedTheme
          : 'dark';

        document.documentElement.setAttribute('data-theme', initialTheme);
      })();
    </script>
    <style>
      :root {
        --splash-bg: var(--app-bg);
        --app-bg: #000000;
        --text: #ffffff;
        --button-bg: #ffffff;
        --button-text: #000000;
        --button-border: #ffffff;

        /* Controles do quadrado (máscara) */
        --mask-top: -11px;
        --mask-left: 170px;
        --mask-width: 50%;
        --mask-height: 30%;

        --mask-reveal-time: 3300ms;
        --glow-time: 1500ms;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      }

      html[data-theme="light"],
      body[data-theme="light"] {
        --app-bg: #ffffff;
        --text: #000000;
        --button-bg: #000000;
        --button-text: #ffffff;
        --button-border: #000000;
      }

      .screen {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }

      #splash {
        background: var(--splash-bg);
        opacity: 1;
        visibility: visible;
        transition: opacity 520ms ease, visibility 520ms ease;
        z-index: 10;
      }

      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      .logo-wrap {
        position: relative;
        width: min(340px, 43vw);
        aspect-ratio: 1068 / 475;
      }

      .logo-wrap img,
      .logo-wrap .fallback {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .logo-wrap img {
        display: none;
        object-fit: contain;
      }

      html[data-theme="dark"] .logo-wrap .logo-dark,
      body[data-theme="dark"] .logo-wrap .logo-dark {
        display: block;
      }

      html[data-theme="light"] .logo-wrap .logo-light,
      body[data-theme="light"] .logo-wrap .logo-light {
        display: block;
      }

      .logo-wrap .fallback {
        display: none;
        place-items: center;
        color: #111;
        font-size: clamp(38px, 8vw, 90px);
        font-style: italic;
        font-weight: 700;
      }

      /* Glow uniforme após sumir o retângulo. */
      .logo-wrap.glow img,
      .logo-wrap.glow .fallback {
        animation: logo-glow var(--glow-time) ease-out forwards;
      }

      html[data-theme="dark"] .logo-wrap.glow .logo-dark,
      body[data-theme="dark"] .logo-wrap.glow .logo-dark {
        --glow-peak-brightness: 1.15;
        --glow-peak-contrast: 1;
        --glow-peak-saturate: 1;
        --glow-shadow-alpha: 0.48;
        --glow-shadow-near: 4px;
        --glow-shadow-far: 7px;
        --glow-shadow-rgb: 245, 247, 230;
      }

      html[data-theme="light"] .logo-wrap.glow .logo-light,
      body[data-theme="light"] .logo-wrap.glow .logo-light {
        --glow-peak-brightness: 1.3;
        --glow-peak-contrast: 0.7;
        --glow-peak-saturate: 1;
        --glow-shadow-alpha: 0.16;
        --glow-shadow-near: 12px;
        --glow-shadow-far: 24px;
        --glow-shadow-rgb: 255, 255, 255;
      }

      .logo-wrap.glow .fallback {
        --glow-peak-brightness: 1.15;
        --glow-peak-contrast: 1;
        --glow-peak-saturate: 1;
        --glow-shadow-alpha: 0.45;
        --glow-shadow-near: 14px;
        --glow-shadow-far: 32px;
        --glow-shadow-rgb: 245, 247, 230;
      }

      @keyframes logo-glow {
        0% {
          filter: brightness(1)
                  contrast(1)
                  saturate(1)
                  drop-shadow(0 0 0 rgba(var(--glow-shadow-rgb, 245, 247, 230), 0));
        }
        45% {
          filter: brightness(var(--glow-peak-brightness, 1.3))
                  contrast(var(--glow-peak-contrast, 1))
                  saturate(var(--glow-peak-saturate, 1))
                  drop-shadow(0 0 var(--glow-shadow-near, 14px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)))
                  drop-shadow(0 0 var(--glow-shadow-far, 32px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)));
        }
        100% {
          filter: brightness(1)
                  contrast(1)
                  saturate(1)
                  drop-shadow(0 0 0 rgba(var(--glow-shadow-rgb, 245, 247, 230), 0));
        }
        45% {
          filter: brightness(var(--glow-peak-brightness, 1.3))
                  contrast(var(--glow-peak-contrast, 1))
                  saturate(var(--glow-peak-saturate, 1))
                  drop-shadow(0 0 var(--glow-shadow-near, 14px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)))
                  drop-shadow(0 0 var(--glow-shadow-far, 32px) rgba(var(--glow-shadow-rgb, 245, 247, 230), var(--glow-shadow-alpha, 0.45)));
        }
        100% {
          filter: brightness(1)
                  contrast(1)
                  saturate(1)
                  drop-shadow(0 0 0 rgba(var(--glow-shadow-rgb, 245, 247, 230), 0));
        }
      }

      .logo-mask {
        position: absolute;
        top: var(--mask-top);
        left: var(--mask-left);
        width: var(--mask-width);
        height: var(--mask-height);
        background: var(--splash-bg);
        clip-path: inset(0 0 0 0);
        animation: reveal-left-to-right var(--mask-reveal-time) ease-out 160ms forwards;
      }

      @keyframes reveal-left-to-right {
        0% {
          clip-path: inset(0 0 0 0);
        }
        100% {
          clip-path: inset(0 0 0 100%);
        }
      }

      #main {
        background: var(--app-bg);
        color: var(--text);
      }

      #main .title {
        margin: 0;
        font-size: clamp(28px, 5vw, 56px);
        font-weight: 400;
      }

      #themeToggle {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 14px;
        border: 1px solid var(--button-border);
        border-radius: 8px;
        background: var(--button-bg);
        color: var(--button-text);
        cursor: pointer;
        font-size: 14px;
      }

      #main[data-ready="false"] { opacity: 0; }

      #main[data-ready="true"] {
        opacity: 1;
        transition: opacity 360ms ease;
      }
    </style>
  </head>
  <body>
    <section id="splash" class="screen" aria-label="Splash screen">
      <div id="logoWrap" class="logo-wrap" role="img" aria-label="Logo Baldi">
        <img
          id="logoDark"
          class="logo-dark"
          alt="Baldi branca"
          src="https://i.ibb.co/933KM0KH/Logo-Baldi-Vers-o-Correta-Branca.png"
        />
        <img
          id="logoLight"
          class="logo-light"
          alt="Baldi preta"
          src="https://i.ibb.co/PzDD4QLk/Logo-Baldi-Vers-o-Correta-Preta.png"
        />
        <div id="logoFallback" class="fallback">Baldi</div>
        <div id="logoMask" class="logo-mask" aria-hidden="true"></div>
      </div>
    </section>

    <main id="main" class="screen" data-ready="false" aria-label="Página inicial">
      <button id="themeToggle" type="button" aria-label="Alternar tema">Modo claro</button>
      <h1 class="title">teste</h1>
    </main>

    <script>
      (function () {
        const GLOW_MS = 1500;

        const splash = document.getElementById('splash');
        const main = document.getElementById('main');
        const logoDark = document.getElementById('logoDark');
        const logoLight = document.getElementById('logoLight');
        const logoWrap = document.getElementById('logoWrap');
        const logoMask = document.getElementById('logoMask');
        const fallback = document.getElementById('logoFallback');
        const themeToggle = document.getElementById('themeToggle');

        const THEME_KEY = 'baldi-theme';
        const getActiveLogo = () => {
          const theme = document.documentElement.getAttribute('data-theme');
          return theme === 'light' ? logoLight : logoDark;
        };

        const applyTheme = (theme) => {
          const nextTheme = (theme === 'light') ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', nextTheme);
          document.body.setAttribute('data-theme', nextTheme);
          themeToggle.textContent = (nextTheme === 'dark') ? 'Modo claro' : 'Modo escuro';
        };

        const storedTheme = localStorage.getItem(THEME_KEY);
        const initialTheme = (storedTheme === 'light' || storedTheme === 'dark')
          ? storedTheme
          : 'dark';
        applyTheme(initialTheme);

        themeToggle.addEventListener('click', () => {
          const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
          const nextTheme = isDark ? 'light' : 'dark';
          applyTheme(nextTheme);
          localStorage.setItem(THEME_KEY, nextTheme);
        });

        // Fallback simples caso a imagem ativa não carregue.
        const handleLogoError = (event) => {
          if (event.currentTarget !== getActiveLogo()) {
            return;
          }

          event.currentTarget.style.display = 'none';
          fallback.style.display = 'grid';
        };

        logoDark.addEventListener('error', handleLogoError);
        logoLight.addEventListener('error', handleLogoError);

        // Sequência: máscara termina -> glow -> entra tela principal.
        logoMask.addEventListener('animationend', () => {
          logoWrap.classList.add('glow');

          const glowTarget = fallback.style.display === 'grid' ? fallback : getActiveLogo();

          glowTarget.addEventListener('animationend', () => {
            main.setAttribute('data-ready', 'true');
            splash.classList.add('hide');
          }, { once: true });

          // Segurança: se o evento não disparar por algum motivo.
          setTimeout(() => {
            if (!splash.classList.contains('hide')) {
              main.setAttribute('data-ready', 'true');
              splash.classList.add('hide');
            }
          }, GLOW_MS + 120);
        }, { once: true });
      })();
    </script>
  </body>
</html>
