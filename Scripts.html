<script>
/* ================== Estado global ================== */
var TOKEN = null, PROFILE = null, FORNECEDORES_CARREGADOS = false;
var EDIT_MODE = false, EDIT_RNC_ID = null;
var RESP_MODE = 'responder';
var DEV_MODE = null;
var ANEXOS_ABERTURA = [], ANEXOS_RESPOSTA = [], ANEXOS_CONCLUSAO = [], ANEXOS_IMPROCEDENTE = [];
var LAST_DEV_ROWS = [], LAST_PEND_ROWS = [], LAST_ALL_ROWS = [], LAST_RNC_ROWS = [];
var CURRENT_RESPOSTA = null, CURRENT_VALIDACAO_CONCLUSAO = null;
var selecionarConclusaoResolver = null;
var confirmarAnexoRespostaResolver = null;
var THEME_KEY = 'portal-theme';

function getSystemTheme(){
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}

function getStoredTheme(){
  try {
    var saved = localStorage.getItem(THEME_KEY);
    return (saved === 'dark' || saved === 'light') ? saved : null;
  } catch (e){
    return null;
  }
}

function applyTheme(theme, options){
  var next = (theme === 'dark') ? 'dark' : 'light';
  var opts = options || {};
  document.documentElement.setAttribute('data-theme', next);
  if (!opts.skipPersist){
    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
  }
  updateThemeButtonLabel(next);
  if (!opts.silent){
    document.dispatchEvent(new CustomEvent('portal-theme-change', { detail: { theme: next } }));
  }
}

function updateThemeButtonLabel(theme){
  var buttons = document.querySelectorAll('[data-theme-toggle]');
  if (!buttons || !buttons.length) return;
  var isDark = theme === 'dark';
  Array.prototype.forEach.call(buttons, function(btn){
    var icon = btn.querySelector('.theme-toggle-icon');
    if (!icon){
      icon = document.createElement('span');
      icon.className = 'theme-toggle-icon';
      icon.setAttribute('aria-hidden', 'true');
      btn.textContent = '';
      btn.appendChild(icon);
    }
    icon.textContent = isDark ? '◑' : '◐';
    btn.setAttribute('aria-label', isDark ? 'Ativar modo claro' : 'Ativar modo escuro');
    btn.setAttribute('title', isDark ? 'Ativar modo claro' : 'Ativar modo escuro');
  });
}

function initTheme(){
  var stored = getStoredTheme();
  applyTheme(stored || getSystemTheme(), { skipPersist: !stored, silent: true });
}

function toggleTheme(){
  var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
}

/* ================== Helpers básicos ================== */
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function setMsg(text, isErr){
  var el = document.getElementById('msg');
  el.textContent = text || '';
  el.className = isErr ? 'err' : 'muted';
}
function fillSelect(sel, arr, includePlaceholder){
  sel.innerHTML = '';
  if (includePlaceholder){
    var p = document.createElement('option');
    p.value = ''; p.textContent = '— selecione —';
    sel.appendChild(p);
  }
  (arr||[]).forEach(function(v){
    var opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}
function esc(t){ return (t==null?'':String(t)).replace(/[&<>"']/g, s=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[s])); }
function hojeBR(){
  var d = new Date();
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yyyy = d.getFullYear();
  return dd+'/'+mm+'/'+yyyy;
}
function fmtDateOnly(dIso){
  if (!dIso) return '';
  var dt = (dIso instanceof Date) ? dIso : new Date(dIso);
  if (Object.prototype.toString.call(dt) === '[object Date]' && !isNaN(dt)){
    var dd = String(dt.getDate()).padStart(2,'0');
    var mm = String(dt.getMonth()+1).padStart(2,'0');
    var yyyy = dt.getFullYear();
    return dd+'/'+mm+'/'+yyyy;
  }
  return '';
}

function normalizeAreaName(area){
  return String(area || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim();
}

function isUserQualidade(){
  var areas = (PROFILE && PROFILE.areas && PROFILE.areas.length) ? PROFILE.areas : (PROFILE && PROFILE.area ? [PROFILE.area] : []);
  var normalized = areas.map(normalizeAreaName);
  return normalized.indexOf('qualidade') !== -1 || normalized.indexOf('gerencia de planejamento e producao') !== -1;
}

function isUserGerencia(){
  var areas = (PROFILE && PROFILE.areas && PROFILE.areas.length) ? PROFILE.areas : (PROFILE && PROFILE.area ? [PROFILE.area] : []);
  var normalized = areas.map(normalizeAreaName);
  return normalized.indexOf('gerencia de planejamento e producao') !== -1;
}

function applyHomeBlockOrderForProfile(){
  var container = document.getElementById('home-blocks');
  var devBlock = document.getElementById('block-devolucoes');
  var pendBlock = document.getElementById('block-pendencias');
  var rncBlock = document.getElementById('block-rncs');
  if (!(container && devBlock && pendBlock && rncBlock)) return;

  container.appendChild(devBlock);
  container.appendChild(pendBlock);
  container.appendChild(rncBlock);

  if (isUserGerencia()) {
    container.insertBefore(rncBlock, devBlock);
    container.insertBefore(pendBlock, devBlock);
  }
}

function updateCountLabel(id, value){
  var el = document.getElementById(id);
  if (el) el.textContent = '(' + value + ')';
}

function toggleSection(btn){
  var targetId = btn && btn.dataset ? btn.dataset.target : '';
  var wrap = targetId ? document.getElementById(targetId) : null;
  if (!wrap) return;
  var nowHidden = wrap.classList.toggle('hidden');
  btn.textContent = nowHidden ? '▶' : '▼';
}

function maskDateInput(val){
  var digits = String(val || '').replace(/\D/g, '').slice(0, 8);
  var parts = [];
  if (digits.length <= 2) return digits;
  parts.push(digits.slice(0, 2));
  if (digits.length <= 4) return parts[0] + '/' + digits.slice(2);
  parts.push(digits.slice(2, 4));
  parts.push(digits.slice(4));
  return parts.join('/');
}

function isValidDateBR(str){
  var m = /^\s*(\d{2})\/(\d{2})\/(\d{4})\s*$/.exec(str || '');
  if (!m) return false;
  var d = parseInt(m[1], 10);
  var mo = parseInt(m[2], 10) - 1;
  var y = parseInt(m[3], 10);
  var dt = new Date(y, mo, d);
  return dt.getFullYear() === y && dt.getMonth() === mo && dt.getDate() === d;
}

function parseDateBR(str){
  var m = /^\s*(\d{2})\/(\d{2})\/(\d{4})\s*$/.exec(str || '');
  if (!m) return null;
  var d = parseInt(m[1], 10);
  var mo = parseInt(m[2], 10) - 1;
  var y = parseInt(m[3], 10);
  var dt = new Date(y, mo, d);
  return (dt.getFullYear() === y && dt.getMonth() === mo && dt.getDate() === d) ? dt : null;
}

function isWeekendDate(dt){
  if (!(dt instanceof Date) || isNaN(dt)) return false;
  var day = dt.getDay();
  return day === 0 || day === 6;
}



function formatDateInput(dt){
  if (!(dt instanceof Date)) return '';
  var y = dt.getFullYear();
  var m = String(dt.getMonth() + 1).padStart(2, '0');
  var d = String(dt.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

function formatDateISOToBR(iso){
  var m = /^\s*(\d{4})-(\d{2})-(\d{2})\s*$/.exec(iso || '');
  if (!m) return '';
  return m[3] + '/' + m[2] + '/' + m[1];
}

function isHomePeriodColumn(tbl, colIndex){
  if (!tbl) return false;
  if (['devTbl','tbl','finTbl'].indexOf(tbl.id) === -1) return false;
  return [2, 9, 10].indexOf(colIndex) !== -1;
}

var prazoDateFilterOverlay;

function ensurePrazoDateFilterOverlay(){
  if (prazoDateFilterOverlay) return prazoDateFilterOverlay;

  var root = document.createElement('div');
  root.className = 'filter-overlay hidden';

  var backdrop = document.createElement('div');
  backdrop.className = 'filter-backdrop';
  root.appendChild(backdrop);

  var dialog = document.createElement('div');
  dialog.className = 'filter-dialog';
  root.appendChild(dialog);

  var header = document.createElement('div');
  header.className = 'filter-header';
  dialog.appendChild(header);

  var title = document.createElement('h4');
  title.className = 'filter-title';
  title.textContent = 'Filtrar por período';
  header.appendChild(title);

  var closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'btn-grey btn-small filter-close';
  closeBtn.textContent = '×';
  header.appendChild(closeBtn);

  var body = document.createElement('div');
  body.className = 'filter-body';
  dialog.appendChild(body);

  var hint = document.createElement('div');
  hint.className = 'muted';
  hint.textContent = 'Selecione o intervalo de datas para filtrar a coluna de prazo.';
  body.appendChild(hint);

  var startLabel = document.createElement('label');
  startLabel.textContent = 'Data inicial';
  var startInput = document.createElement('input');
  startInput.type = 'date';
  body.appendChild(startLabel);
  body.appendChild(startInput);

  var endLabel = document.createElement('label');
  endLabel.textContent = 'Data final';
  var endInput = document.createElement('input');
  endInput.type = 'date';
  body.appendChild(endLabel);
  body.appendChild(endInput);

  var actions = document.createElement('div');
  actions.className = 'filter-actions';
  dialog.appendChild(actions);

  var clearBtn = document.createElement('button');
  clearBtn.type = 'button';
  clearBtn.className = 'btn-grey';
  clearBtn.textContent = 'Limpar';
  actions.appendChild(clearBtn);

  var applyBtn = document.createElement('button');
  applyBtn.type = 'button';
  applyBtn.className = 'btn';
  applyBtn.textContent = 'Aplicar período';
  actions.appendChild(applyBtn);

  prazoDateFilterOverlay = {
    root: root,
    startInput: startInput,
    endInput: endInput,
    clearBtn: clearBtn,
    applyBtn: applyBtn,
    closeBtn: closeBtn,
    backdrop: backdrop
  };

  function close(){ root.classList.add('hidden'); }
  closeBtn.addEventListener('click', close);
  backdrop.addEventListener('click', close);

  document.body.appendChild(root);
  return prazoDateFilterOverlay;
}

function openPrazoDateFilter(tbl, colIndex){
  var overlay = ensurePrazoDateFilterOverlay();
  var state = getTableFilterState(tbl);
  var current = state[colIndex] || {};
  var hasDateRange = current && current.type === 'dateRange';
  var start = hasDateRange ? parseDateBR(current.start || '') : null;
  var end = hasDateRange ? parseDateBR(current.end || '') : null;

  overlay.startInput.value = start ? formatDateInput(start) : '';
  overlay.endInput.value = end ? formatDateInput(end) : '';
  overlay.root.classList.remove('hidden');

  overlay.applyBtn.onclick = function(){
    var startBR = formatDateISOToBR(overlay.startInput.value);
    var endBR = formatDateISOToBR(overlay.endInput.value);
    if (!startBR && !endBR){
      delete state[colIndex];
    } else {
      state[colIndex] = { type: 'dateRange', start: startBR, end: endBR };
    }
    applyTableFilters(tbl);
    overlay.root.classList.add('hidden');
  };

  overlay.clearBtn.onclick = function(){
    delete state[colIndex];
    overlay.startInput.value = '';
    overlay.endInput.value = '';
    applyTableFilters(tbl);
    overlay.root.classList.add('hidden');
  };

}

function getSolucoesAtuais(){
  return (CURRENT_RESPOSTA && Array.isArray(CURRENT_RESPOSTA.solucoes)) ? CURRENT_RESPOSTA.solucoes : [];
}

function getAcoesValidadasAtuais(){
  var arr = (CURRENT_VALIDACAO_CONCLUSAO && Array.isArray(CURRENT_VALIDACAO_CONCLUSAO.acoesValidadas)) ? CURRENT_VALIDACAO_CONCLUSAO.acoesValidadas : [];
  return arr
    .map(function(v){ return parseInt(v, 10); })
    .filter(function(n){ return !isNaN(n) && n >= 0; });
}

function getAcoesConcluidasAtuais(){
  var arr = (CURRENT_VALIDACAO_CONCLUSAO && Array.isArray(CURRENT_VALIDACAO_CONCLUSAO.acoesConcluidas)) ? CURRENT_VALIDACAO_CONCLUSAO.acoesConcluidas : [];
  return arr
    .map(function(v){ return parseInt(v, 10); })
    .filter(function(n){ return !isNaN(n) && n >= 0; });
}

function getRowColor(val){
  var v = String(val || '').trim().toLowerCase();
  if (v === 'verde') return '#15803d';
  if (v === 'vermelho') return '#b91c1c';
  if (v === 'cinza') return '#9ca3af';
  return 'var(--text)';
}

function applyRowColor(tr, corVal){
  if (tr) tr.style.color = getRowColor(corVal);
}

function getCellValue(row, colIndex){
  var cell = row && row.children ? row.children[colIndex] : null;
  return cell ? cell.textContent.trim() : '';
}

function getUniqueColumnValues(tbl, colIndex){
  var vals = [];
  var seen = {};
  var rows = tbl ? tbl.querySelectorAll('tbody tr') : [];
  Array.prototype.forEach.call(rows, function(tr){
    var val = getCellValue(tr, colIndex);
    var key = val || '';
    if (!seen[key]){
      seen[key] = true;
      vals.push(val);
    }
  });
  return vals.sort();
}

function getTableFilterState(tbl){
  if (!tbl._filterSelections) tbl._filterSelections = {};
  return tbl._filterSelections;
}

var columnFilterOverlay;

function buildColumnFilterOverlay(){
  if (columnFilterOverlay) return columnFilterOverlay;
  var root = document.createElement('div');
  root.className = 'filter-overlay hidden';

  var backdrop = document.createElement('div');
  backdrop.className = 'filter-backdrop';
  root.appendChild(backdrop);

  var dialog = document.createElement('div');
  dialog.className = 'filter-dialog';
  root.appendChild(dialog);

  var header = document.createElement('div');
  header.className = 'filter-header';
  dialog.appendChild(header);

  var title = document.createElement('h4');
  title.className = 'filter-title';
  title.textContent = 'Filtro';
  header.appendChild(title);

  var closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'btn-grey btn-small filter-close';
  closeBtn.textContent = '×';
  header.appendChild(closeBtn);

  var body = document.createElement('div');
  body.className = 'filter-body';
  dialog.appendChild(body);

  var selectAllWrap = document.createElement('label');
  selectAllWrap.className = 'checkbox-inline filter-option';
  var selectAllInput = document.createElement('input');
  selectAllInput.type = 'checkbox';
  selectAllInput.checked = true;
  selectAllWrap.appendChild(selectAllInput);
  var selectAllText = document.createElement('span');
  selectAllText.className = 'filter-option-label';
  selectAllText.textContent = 'Selecionar todos';
  selectAllWrap.appendChild(selectAllText);
  body.appendChild(selectAllWrap);

  var searchInput = document.createElement('input');
  searchInput.type = 'text';
  searchInput.className = 'filter-search-input';
  searchInput.placeholder = 'Digite para filtrar...';
  body.appendChild(searchInput);

  var optionsWrap = document.createElement('div');
  optionsWrap.className = 'filter-options';
  body.appendChild(optionsWrap);

  var actions = document.createElement('div');
  actions.className = 'filter-actions';
  dialog.appendChild(actions);

  var applyBtn = document.createElement('button');
  applyBtn.type = 'button';
  applyBtn.className = 'btn';
  applyBtn.textContent = 'Aplicar';
  actions.appendChild(applyBtn);

  var clearBtn = document.createElement('button');
  clearBtn.type = 'button';
  clearBtn.className = 'btn-grey';
  clearBtn.textContent = 'Limpar';
  actions.appendChild(clearBtn);

  columnFilterOverlay = {
    root: root,
    title: title,
    searchInput: searchInput,
    optionsWrap: optionsWrap,
    selectAll: selectAllInput,
    applyBtn: applyBtn,
    clearBtn: clearBtn,
    closeBtn: closeBtn,
    currentTable: null,
    currentCol: null,
    currentValues: []
  };

  backdrop.addEventListener('click', closeColumnFilterOverlay);
  closeBtn.addEventListener('click', closeColumnFilterOverlay);
  clearBtn.addEventListener('click', function(){
    if (!columnFilterOverlay.currentTable) return;
    var state = getTableFilterState(columnFilterOverlay.currentTable);
    delete state[columnFilterOverlay.currentCol];
    applyTableFilters(columnFilterOverlay.currentTable);
    closeColumnFilterOverlay();
  });
  applyBtn.addEventListener('click', function(){
    if (!columnFilterOverlay.currentTable) return;
    var checkboxes = columnFilterOverlay.optionsWrap.querySelectorAll('input[type="checkbox"]');
    var hasSearchTerm = !!(columnFilterOverlay.searchInput && columnFilterOverlay.searchInput.value && columnFilterOverlay.searchInput.value.trim());
    var selected = [];
    Array.prototype.forEach.call(checkboxes, function(cb){
      if (!cb.checked) return;
      if (hasSearchTerm){
        var option = cb.closest('.filter-option');
        if (option && option.style.display === 'none') return;
      }
      selected.push(cb.value);
    });
    var state = getTableFilterState(columnFilterOverlay.currentTable);
    if (selected.length === columnFilterOverlay.currentValues.length){
      delete state[columnFilterOverlay.currentCol];
    } else {
      state[columnFilterOverlay.currentCol] = new Set(selected);
    }
    applyTableFilters(columnFilterOverlay.currentTable);
    closeColumnFilterOverlay();
  });
  selectAllInput.addEventListener('change', function(){
    var options = columnFilterOverlay.optionsWrap.querySelectorAll('.filter-option');
    Array.prototype.forEach.call(options, function(opt){
      if (opt.style.display === 'none') return;
      var cb = opt.querySelector('input[type="checkbox"]');
      if (cb) cb.checked = selectAllInput.checked;
    });
  });
  searchInput.addEventListener('input', updateFilterOptionsVisibility);

  document.body.appendChild(root);
  return columnFilterOverlay;
}

function updateFilterOptionsVisibility(){
  if (!columnFilterOverlay) return;
  var term = (columnFilterOverlay.searchInput.value || '').toLowerCase().trim();
  var options = columnFilterOverlay.optionsWrap.querySelectorAll('.filter-option');
  var visibleCheckboxes = [];
  Array.prototype.forEach.call(options, function(opt){
    var textEl = opt.querySelector('.filter-option-label');
    var label = textEl ? (textEl.textContent || '') : '';
    var visible = !term || label.toLowerCase().indexOf(term) !== -1;
    opt.style.display = visible ? '' : 'none';
    if (!visible) return;
    var cb = opt.querySelector('input[type="checkbox"]');
    if (cb) visibleCheckboxes.push(cb);
  });
  var allVisibleChecked = visibleCheckboxes.length > 0;
  Array.prototype.forEach.call(visibleCheckboxes, function(cb){
    if (!cb.checked) allVisibleChecked = false;
  });
  columnFilterOverlay.selectAll.checked = visibleCheckboxes.length > 0 && allVisibleChecked;
}

function closeColumnFilterOverlay(){
  if (columnFilterOverlay) columnFilterOverlay.root.classList.add('hidden');
}

function openColumnFilter(tbl, colIndex){
  var overlay = buildColumnFilterOverlay();
  overlay.currentTable = tbl;
  overlay.currentCol = colIndex;
  overlay.currentValues = getUniqueColumnValues(tbl, colIndex);

  var thead = tbl ? tbl.querySelector('thead') : null;
  var headerRow = thead ? thead.querySelector('tr') : null;
  var headerCell = headerRow && headerRow.children ? headerRow.children[colIndex] : null;
  overlay.title.textContent = headerCell ? (headerCell.textContent.trim() || 'Filtro') : 'Filtro';

  overlay.searchInput.value = '';
  overlay.optionsWrap.innerHTML = '';

  var state = getTableFilterState(tbl);
  var selectedSet = state[colIndex] instanceof Set ? state[colIndex] : null;
  var selectAll = !selectedSet || selectedSet.size === overlay.currentValues.length;
  overlay.selectAll.checked = selectAll;

  overlay.currentValues.forEach(function(val){
    var opt = document.createElement('label');
    opt.className = 'filter-option';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = val;
    cb.checked = selectAll || (selectedSet ? selectedSet.has(val) : true);
    opt.appendChild(cb);
    var txt = document.createElement('span');
    txt.className = 'filter-option-label';
    txt.textContent = val || '(Vazio)';
    opt.appendChild(txt);
    overlay.optionsWrap.appendChild(opt);
  });

  updateFilterOptionsVisibility();
  overlay.root.classList.remove('hidden');
  overlay.searchInput.focus();
}

function ensureTableFilters(tbl){
  if (!tbl) return;
  var thead = tbl.querySelector('thead');
  if (!thead) return;
  var headerRow = null;
  Array.prototype.forEach.call(thead.querySelectorAll('tr'), function(tr){
    if (!tr.classList.contains('filters-row') && !headerRow) headerRow = tr;
  });
  if (!headerRow) return;

  var existing = thead.querySelector('tr.filters-row');
  if (existing) existing.remove();

  var filterRow = document.createElement('tr');
  filterRow.className = 'filters-row';
  var colCount = headerRow.children.length;
  for (var i=0; i<colCount; i++){
    var th = document.createElement('th');
    th.className = 'filter-cell';
    var wrap = document.createElement('div');
    wrap.className = 'filter-btn-group';

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-btn filter-btn-open';
    btn.innerHTML = (isHomePeriodColumn(tbl, i)
      ? '<span class="calendar-icon" aria-hidden="true"></span><span class="sr-only">Filtrar período</span>'
      : '<span class="filter-icon" aria-hidden="true"></span><span class="sr-only">Filtro</span>');
    btn.title = 'Abrir filtro';
    btn.dataset.colIndex = String(i);
    btn.style.pointerEvents = 'auto';
    btn.addEventListener('click', function(){
      var col = parseInt(this.dataset.colIndex, 10);
      if (isHomePeriodColumn(tbl, col)) { openPrazoDateFilter(tbl, col); return; }
      openColumnFilter(tbl, col);
    });
    wrap.appendChild(btn);

    var clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.className = 'filter-btn filter-btn-clear';
    clearBtn.textContent = '×';
    clearBtn.title = 'Limpar filtro';
    clearBtn.dataset.colIndex = String(i);
    clearBtn.style.pointerEvents = 'auto';
    clearBtn.addEventListener('click', function(){
      var col = parseInt(this.dataset.colIndex, 10);
      var state = getTableFilterState(tbl);
      delete state[col];
      applyTableFilters(tbl);
    });
    wrap.appendChild(clearBtn);

    th.appendChild(wrap);
    filterRow.appendChild(th);
  }
  thead.appendChild(filterRow);
    syncStickyHeaderOffsets(tbl);

  updateFilterButtons(tbl);
}

function syncStickyHeaderOffsets(tbl){
  if (!tbl) return;
  var headerRow = tbl.querySelector('thead tr:not(.filters-row)');
  if (!headerRow) return;

  // Usa a altura renderizada (com frações) e sobrepõe 2px para eliminar fresta
  // entre cabeçalho e filtros em claro/escuro (inclusive com borda/subpixel).
  var renderedHeaderHeight = Math.ceil(headerRow.getBoundingClientRect().height || headerRow.offsetHeight || 0);
  var wrap = tbl.closest('.table-wrap');
  var stickyGap = 0;
  if (wrap) {
    var parsedGap = parseFloat(window.getComputedStyle(wrap).getPropertyValue('--table-sticky-gap'));
    stickyGap = Number.isFinite(parsedGap) ? parsedGap : 0;
  }
  var stickyTop = Math.max(renderedHeaderHeight - 2 + stickyGap, 0);
  Array.prototype.forEach.call(tbl.querySelectorAll('thead tr.filters-row th'), function(th){
    th.style.top = stickyTop + 'px';
  });
}

function applyTableFilters(tbl){
  if (!tbl) return;
  var state = getTableFilterState(tbl);
  var rows = tbl.querySelectorAll('tbody tr');
  var visibleCount = 0;
  Array.prototype.forEach.call(rows, function(tr){
    var visible = true;
    for (var key in state){
      if (!Object.prototype.hasOwnProperty.call(state, key)) continue;
      var allowed = state[key];
      var colIdx = parseInt(key, 10);
      var val = getCellValue(tr, colIdx);
      if (allowed instanceof Set){
        if (allowed.size === 0 || !allowed.has(val)) { visible = false; break; }
        continue;
      }
      if (allowed && allowed.type === 'dateRange'){
        var cellDate = parseDateBR(val);
        var startDate = parseDateBR(allowed.start || '');
        var endDate = parseDateBR(allowed.end || '');
        if (!cellDate) { visible = false; break; }
        if (startDate && cellDate < startDate) { visible = false; break; }
        if (endDate && cellDate > endDate) { visible = false; break; }
      }
    }
    tr.style.display = visible ? '' : 'none';
    if (visible) visibleCount++;
  });

  updateHomeBlockCountFromTable(tbl, visibleCount);
  updateFilterButtons(tbl);
  updateHomeTableVerticalScroll(tbl);
}

function updateHomeBlockCountFromTable(tbl, visibleCount){
  if (!tbl) return;
  var countLabelByTable = {
    devTbl: 'devCount',
    tbl: 'pendCount',
    finTbl: 'finCount'
  };
  var countId = countLabelByTable[tbl.id];
  if (!countId) return;
  updateCountLabel(countId, visibleCount || 0);
}

function updateHomeTableVerticalScroll(tbl){
  if (!tbl || ['devTbl', 'tbl', 'finTbl'].indexOf(tbl.id) === -1) return;

  syncStickyHeaderOffsets(tbl);

  var wrap = tbl.closest('.table-wrap');
  if (!wrap) return;

  if (tbl.classList.contains('hidden')) {
    wrap.style.maxHeight = '';
    return;
  }

  var maxRows = 10;
  var visibleRows = Array.prototype.filter.call(tbl.querySelectorAll('tbody tr'), function(tr){
    return tr.style.display !== 'none';
  });

  if (!visibleRows.length || visibleRows.length <= maxRows) {
    wrap.style.maxHeight = '';
    return;
  }

  var headerHeight = 0;
  Array.prototype.forEach.call(tbl.querySelectorAll('thead tr'), function(tr){
    headerHeight += tr.offsetHeight || 0;
  });

  var rowsHeight = 0;
  for (var i = 0; i < Math.min(maxRows, visibleRows.length); i++) {
    rowsHeight += visibleRows[i].offsetHeight || 0;
  }

  if (headerHeight <= 0 || rowsHeight <= 0) {
    wrap.style.maxHeight = '';
    return;
  }

  // margem extra para evitar corte parcial da 10ª linha por arredondamento/subpixel
  wrap.style.maxHeight = (headerHeight + rowsHeight + 30) + 'px';
}

function updateFilterButtons(tbl){
  if (!tbl) return;
  var state = getTableFilterState(tbl);
  var headerRow = tbl.querySelector('thead tr.filters-row');
  if (!headerRow) return;

  Array.prototype.forEach.call(headerRow.querySelectorAll('.filter-btn-open, .filter-btn-clear'), function(btn){
    var col = parseInt(btn.dataset.colIndex, 10);
    var entry = state[col];
    var isActive = (entry instanceof Set) || (entry && entry.type === 'dateRange');
    btn.classList.toggle('filter-btn-active', isActive);
    btn.classList.toggle('filter-btn-inactive', !isActive);
  });
}

function renderLinks(list){

    : '—';

function splitAnexosPorTipo(list){
  var abert = [], resp = [], conc = [], improc = [];
  (list || []).forEach(function(a){
    var nm = String(a && a.name || '').toLowerCase();
    if (nm.indexOf(' - resp') >= 0) resp.push(a);
    else if (nm.indexOf(' - conc') >= 0) conc.push(a);
    else if (nm.indexOf(' - improcedente') >= 0) improc.push(a);
    else abert.push(a);
  });
  return { abertura: abert, resposta: resp, conclusao: conc, improcedente: improc };
}

function atualizarEstadoAnexos(list){
  var partes = splitAnexosPorTipo(list || []);
  ANEXOS_ABERTURA = partes.abertura;
  ANEXOS_RESPOSTA = partes.resposta;
  ANEXOS_CONCLUSAO = partes.conclusao;
  ANEXOS_IMPROCEDENTE = partes.improcedente;
}

/* Força Porquês empilhados (Visualizar) */
function forceStackedVisPorques(){
  ['vis_pq1','vis_pq2','vis_pq3','vis_pq4','vis_pq5'].forEach(function(id){
    var el = document.getElementById(id);
    if (!el) return;
    try {
      el.setAttribute('rows', '1');
      autoResizeTextarea(el);
    } catch(_) {}
  });
}


function autoResizeTextarea(el){
  if (!el) return;
  if (!el.dataset.baseHeight){
    var cs = window.getComputedStyle(el);
    var rows = Number(el.getAttribute('rows') || 2);
    var lineHeight = parseFloat(cs.lineHeight);
    if (!lineHeight || !isFinite(lineHeight)) lineHeight = 20;
    var padding = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    var border = (parseFloat(cs.borderTopWidth) || 0) + (parseFloat(cs.borderBottomWidth) || 0);
    var baseHeight = Math.ceil((lineHeight * rows) + padding + border);
    el.dataset.baseHeight = String(baseHeight);
  }
  var minHeight = Number(el.dataset.baseHeight || 0);
  el.style.height = 'auto';
  el.style.height = Math.max(el.scrollHeight, minHeight) + 'px';
}

function autoResizeWithin(container){
  if (!container) return;
  Array.prototype.forEach.call(container.querySelectorAll('textarea.autoresize'), function(el){
    autoResizeTextarea(el);
  });
}

function autoResizePrintFields(){
  function resizePrintField(el){
    if (!el) return;
    var cs = window.getComputedStyle(el);
    var lineHeight = parseFloat(cs.lineHeight);
    if (!lineHeight || !isFinite(lineHeight)) lineHeight = 20;
    var padding = (parseFloat(cs.paddingTop) || 0) + (parseFloat(cs.paddingBottom) || 0);
    var border = (parseFloat(cs.borderTopWidth) || 0) + (parseFloat(cs.borderBottomWidth) || 0);
    var minHeight = Math.ceil(lineHeight + padding + border);
    var hasValueProp = typeof el.value === 'string';
    var content = hasValueProp ? String(el.value || '') : String(el.textContent || '');
    var hasContent = content.trim().length > 0;

    el.style.overflowY = 'hidden';
    el.style.resize = 'none';

    if (hasValueProp){
      var originalValue = el.value;
      el.value = hasContent ? (originalValue + '\n') : '';
      el.style.height = 'auto';
      var measuredHeight = el.scrollHeight;
      el.value = originalValue;
      el.style.height = 'auto';
      el.style.height = Math.max(hasContent ? measuredHeight : minHeight, minHeight) + 'px';
      return;
    }

    el.style.height = 'auto';
    var fallbackHeight = hasContent ? (el.scrollHeight + lineHeight) : minHeight;
    el.style.height = Math.max(fallbackHeight, minHeight) + 'px';
  }

  var fixedIds = [
    'vis_descricao',
    'vis_descCorrecao',
    'vis_motivoImprocedente',
    'vis_pq1',
    'vis_pq2',
    'vis_pq3',
    'vis_pq4',
    'vis_pq5'
  ];
  fixedIds.forEach(function(id){
    var el = document.getElementById(id);
    resizePrintField(el);
  });

  var viewVisualizar = document.getElementById('view-visualizar');
  if (!viewVisualizar) return;
  Array.prototype.forEach.call(
    viewVisualizar.querySelectorAll('#vis_solucoesList textarea.autoresize'),
    function(el){
      resizePrintField(el);
    }
  );
}

function prepareAndPrintVisualizar(){
  var viewVisualizar = document.getElementById('view-visualizar');
  if (!viewVisualizar) {
    window.print();
    return;
  }
  viewVisualizar.classList.add('is-printing');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      autoResizePrintFields();
      window.print();
    });
  });
}

var GLOBAL_LOADING_COUNT = 0;
function getGlobalLoadingModal(){
  var modal = document.getElementById('globalLoadingModal');
  if (modal) return modal;

  var source = document.getElementById('logoutLoadingModal');
  if (source && document.body){
    modal = source.cloneNode(true);
    modal.id = 'globalLoadingModal';
    modal.classList.add('hidden');
    modal.setAttribute('aria-hidden', 'true');
    document.body.appendChild(modal);
    return modal;
  }

  return source || null;
}

function beginGlobalLoading(){
  GLOBAL_LOADING_COUNT += 1;
  var loadingModal = getGlobalLoadingModal();
  if (loadingModal) loadingModal.classList.remove('hidden');
}

function endGlobalLoading(){
  GLOBAL_LOADING_COUNT = Math.max(0, GLOBAL_LOADING_COUNT - 1);
  if (GLOBAL_LOADING_COUNT > 0) return;
  var loadingModal = getGlobalLoadingModal();
  if (loadingModal) loadingModal.classList.add('hidden');
}

var HOME_CELL_TOOLTIP = null;

function ensureHomeCellTooltip(){
  if (HOME_CELL_TOOLTIP && document.body.contains(HOME_CELL_TOOLTIP)) return HOME_CELL_TOOLTIP;
  var el = document.createElement('div');
  el.id = 'homeCellTooltip';
  el.className = 'home-cell-tooltip hidden';
  document.body.appendChild(el);
  HOME_CELL_TOOLTIP = el;
  return el;
}

function hideHomeCellTooltip(){
  var el = ensureHomeCellTooltip();
  el.classList.add('hidden');
  el.textContent = '';
}

function moveHomeCellTooltip(ev){
  var el = ensureHomeCellTooltip();
  if (el.classList.contains('hidden')) return;
  var offset = 12;
  var x = ev.clientX + offset;
  var y = ev.clientY + offset;
  var maxX = window.innerWidth - el.offsetWidth - 8;
  var maxY = window.innerHeight - el.offsetHeight - 8;
  el.style.left = Math.max(8, Math.min(x, maxX)) + 'px';
  el.style.top = Math.max(8, Math.min(y, maxY)) + 'px';
}

function showHomeCellTooltip(td, ev){
  var text = td.getAttribute('data-full-text') || '';
  if (!text) return;
  var el = ensureHomeCellTooltip();
  el.textContent = text;
  el.classList.remove('hidden');
  moveHomeCellTooltip(ev);
}

function applyTruncatedCellTooltip(tableEl){
  if (!tableEl) return;
  var cells = tableEl.querySelectorAll('tbody td');
  Array.prototype.forEach.call(cells, function(td){
    td.classList.remove('is-truncated');
    td.removeAttribute('data-full-text');
    td.onmouseenter = null;
    td.onmousemove = null;
    td.onmouseleave = null;
    var txt = (td.textContent || '').trim();
    if (!txt) return;
    if (td.scrollWidth > td.clientWidth + 1){
      td.classList.add('is-truncated');
      td.setAttribute('data-full-text', txt);
      td.onmouseenter = function(ev){ showHomeCellTooltip(td, ev); };
      td.onmousemove = moveHomeCellTooltip;
      td.onmouseleave = hideHomeCellTooltip;
    }
  });
}

function refreshHomeTruncatedTooltips(){
  ['devTbl','tbl','finTbl'].forEach(function(id){
    var t = document.getElementById(id);
    if (t && !t.classList.contains('hidden')) applyTruncatedCellTooltip(t);
  });
}

function abrirResponder(rnc, ano, mes, devolucaoTipo){
  RESP_MODE = 'responder';
  hide('view-home'); hide('view-criar'); hide('view-visualizar'); show('view-responder');
  prepararPainelDireitoParaResposta();
  DEV_MODE = devolucaoTipo || null;

  var h1 = document.querySelector('#view-responder h1');
  if (h1) h1.textContent = 'Responder RNC';

  document.getElementById('respForm').classList.remove('hidden');
  document.getElementById('resp_dataResposta').value = hojeBR();
  ['resp_dataResposta'].forEach(function(id){ var el = document.getElementById(id); if (el){ el.readOnly = false; el.classList.remove('readonly'); }});
  resetSolucoes(); addSlnRow();

  ['pq1','pq2','pq3','pq4','pq5'].forEach(function(id){ var el = document.getElementById(id); if (el){ el.readOnly = false; el.classList.remove('readonly'); } });

function setSolucoesReadonly(flag){
  var cont = document.getElementById('solucoesList');
  if (!cont) return;
  var rows = cont.querySelectorAll('.grid-sln');
  for (var i=0;i<rows.length;i++){
    var ac = rows[i].querySelector('.sln-acao');
    var rs = rows[i].querySelector('.sln-resp');
    var pr = rows[i].querySelector('.sln-prazo');
    if (ac){ ac.readOnly = !!flag; ac.classList.toggle('readonly', !!flag); }
    if (rs){ rs.readOnly = !!flag; rs.classList.toggle('readonly', !!flag); }
    if (pr){ pr.readOnly = !!flag; pr.classList.toggle('readonly', !!flag); }
  }
}

function abrirValidar(rnc, ano, mes, mode){
  RESP_MODE = mode || 'validar';
  hide('view-home'); hide('view-criar'); hide('view-visualizar'); show('view-responder');
  prepararPainelDireitoParaResposta();
  var btnImp = document.getElementById('btnImprocedente');
  if (btnImp) btnImp.classList.add('hidden');

  if (mode === 'resposta' || mode === 'conclusao'){
    if (h1) h1.textContent = (mode === 'conclusao') ? 'Validar conclusão' : 'Validar resposta';

    var bl = document.getElementById('respValResposta');
    if (bl) bl.classList.remove('hidden');

    if (b2){ b2.dataset.rnc = rnc; b2.dataset.mode = mode; b2.textContent = (mode==='conclusao'?'Retornar conclusão':'Retornar resposta'); }

    document.getElementById('btnRetornar').dataset.rnc = rnc;
    document.getElementById('btnEnviarRetorno').dataset.rnc = rnc;
  }

  preencherCamposResponder(rnc, ano, mes);
}

function preencherCamposResponder(rnc, ano, mes){
  beginGlobalLoading();
  ['resp_rnc','resp_pv','resp_op','resp_origem','resp_fornecedor','resp_responsavel','resp_descricao','resp_motivo','resp_disposicao','resp_descCorrecao','resp_dataAbertura'].forEach(function(id){
    var el = document.getElementById(id);
    if (!el) return;
    if (el.tagName==='TEXTAREA') el.value=''; else el.value='';
  });

  google.script.run
    .withFailureHandler(function(err){
      endGlobalLoading();
      var qp = document.getElementById('qualidadeMsg') || document.getElementById('respMsg');
      if (qp) qp.textContent = (err && err.message) ? err.message : String(err);
    })
    .withSuccessHandler(function(res){
      endGlobalLoading();
      var d = res && res.dados ? res.dados : {};
      var anex = Array.isArray(res.anexos) ? res.anexos : [];
      atualizarEtiquetaReincidencia(res && res.reincidencia, res && res.statusEtapa);

      var retMsgResp = document.getElementById('retornoMsgResp');
      var etapaRetornoResp = (res && res.retornoEtapa) ? String(res.retornoEtapa).toLowerCase() : '';
      var isRetornoResp = etapaRetornoResp.indexOf('retorno resposta') === 0 || etapaRetornoResp.indexOf('retorno conclusão') === 0;
      if (retMsgResp){
        if (isRetornoResp && res.retornoMsg){
          retMsgResp.textContent = 'Retorno da Qualidade: ' + res.retornoMsg;
          retMsgResp.classList.remove('hidden');
        } else {
          retMsgResp.textContent = '';
          retMsgResp.classList.add('hidden');
        }
      }

      // Separa anexos por tipo e preenche nos lugares corretos
      atualizarEstadoAnexos(anex);
      renderAnexosComAcao('resp_anexosAbertura', ANEXOS_ABERTURA, 'abertura');
      renderAnexosComAcao('resp_anexosResposta', ANEXOS_RESPOSTA, 'resposta');
      renderAnexosComAcao('resp_anexosConclusao', ANEXOS_CONCLUSAO, 'conclusao');
      var isImprocedenteAtual = !!(CURRENT_RESPOSTA && ((CURRENT_RESPOSTA.motivoImprocedente && String(CURRENT_RESPOSTA.motivoImprocedente).trim()) || String(CURRENT_RESPOSTA.tipo || '').toLowerCase() === 'improcedente'));
      renderValAnexos(isImprocedenteAtual);

      // Dados da abertura
      document.getElementById('resp_rnc').value = d.rncId || rnc || '';
      var btnImpLocal = document.getElementById('btnImprocedente');
      if (btnImpLocal) btnImpLocal.dataset.rnc = d.rncId || rnc || '';
      document.getElementById('resp_dataAbertura').value = res.dataAbertura || '';
      document.getElementById('resp_pv').value = d.pv || '';
      document.getElementById('resp_op').value = d.op || '';
      document.getElementById('resp_origem').value = d.origem || '';
      document.getElementById('resp_fornecedor').value = d.fornecedor || '';
      document.getElementById('resp_responsavel').value = d.responsavel || '';
      document.getElementById('resp_descricao').value = d.descricao || '';
      document.getElementById('resp_motivo').value = d.motivo || '';
      document.getElementById('resp_disposicao').value = d.disposicao || '';
      document.getElementById('resp_descCorrecao').value = d.descricaoAcaoCorretiva || '';
      autoResizeTextarea(document.getElementById('resp_descricao'));
      autoResizeTextarea(document.getElementById('resp_descCorrecao'));

      /* ====== Dados de resposta ====== */
      var r = d.resposta || null;
      CURRENT_RESPOSTA = r;
      var defaultValidacao = { acoesValidadas: [], acoesConcluidas: [], retornoConclusao: '' };

/* ================== Util: ler arquivos base64 ================== */
function readFilesAsBase64(files, limitMB){
  return new Promise(function(resolve){
    if (!files || !files.length) return resolve([]);
    var out = [], pending = files.length;
    for (var i=0;i<files.length;i++){
      (function(file){
        if (limitMB && file.size > limitMB*1024*1024){
          out.push({ error: 'Arquivo acima de '+limitMB+'MB: '+file.name });
          if (--pending === 0) resolve(out);
          return;
        }
        var fr = new FileReader();
        fr.onload = function(e){
          var dataUrl = String(e.target.result || '');
          var comma = dataUrl.indexOf('base64,');
          var base64 = comma >= 0 ? dataUrl.substring(comma + 7) : '';
          out.push({ name:file.name, mimeType:file.type || 'application/octet-stream', dataBase64: base64 });
          if (--pending === 0) resolve(out);
        };
        fr.onerror = function(){ if (--pending === 0) resolve(out); };
        fr.readAsDataURL(file);
      })(files[i]);
    }
  });
}

function abrirSelecaoConclusaoModal(itens, titulo, infoMsg){
  var modal = document.getElementById('selecionarConclusaoModal');
  var list = document.getElementById('selecionarConclusaoList');
  var info = document.getElementById('selecionarConclusaoInfo');
  var titleEl = document.getElementById('selecionarConclusaoTitulo');
  var err = document.getElementById('selecionarConclusaoError');
  if (!modal || !list) return;

  if (titleEl && titulo) titleEl.textContent = titulo;
  if (info) info.textContent = infoMsg || '';
  if (err) err.textContent = '';
  list.innerHTML = '';

  if (!Array.isArray(itens) || !itens.length){
    list.innerHTML = '<div class="muted">Nenhuma ação disponível.</div>';
  } else {
    itens.forEach(function(item, idx){
      var sol = item && item.solucao ? item.solucao : {};
      var realIdx = item && typeof item.indice === 'number' ? item.indice : idx;
      var row = document.createElement('div');
      row.className = 'pa-validacao-item';
      var id = 'chk-conc-'+realIdx+'-'+idx;

      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.id = id;
      chk.value = String(realIdx);
      if (item && item.checked) chk.checked = true;
      if (item && item.disabled) {
        chk.disabled = true;
        row.classList.add('pa-validacao-item-disabled');
      }

      var lbl = document.createElement('label');
      lbl.setAttribute('for', id);
      lbl.innerHTML = '<div class="pa-validacao-acao">'+esc(sol.acao || '')+'</div>'+
                      '<div class="pa-validacao-meta">Responsável: '+esc(sol.responsavel || '-')+' · Prazo: '+esc(sol.prazo || '-')+'</div>';

      row.appendChild(chk);
      row.appendChild(lbl);
      list.appendChild(row);
    });
  }

  modal.classList.remove('hidden');
}

function fecharSelecaoConclusaoModal(resultado){
  var modal = document.getElementById('selecionarConclusaoModal');
  if (modal) modal.classList.add('hidden');
  var err = document.getElementById('selecionarConclusaoError');
  if (err) err.textContent = '';
  if (typeof selecionarConclusaoResolver === 'function'){
    selecionarConclusaoResolver(resultado);
    selecionarConclusaoResolver = null;
  }
}

function confirmarSelecaoConclusao(){
  var list = document.getElementById('selecionarConclusaoList');
  var err = document.getElementById('selecionarConclusaoError');
  var selecionadas = [];
  if (list){
    Array.prototype.forEach.call(list.querySelectorAll('input[type="checkbox"]'), function(chk){
      if (chk && chk.checked){
        var n = parseInt(chk.value, 10);
        if (!isNaN(n)) selecionadas.push(n);
      }
    });
  }
  if (!selecionadas.length){
    if (err) err.textContent = 'Selecione ao menos uma ação concluída.';
    return;
  }
  fecharSelecaoConclusaoModal(selecionadas);
}

function cancelarSelecaoConclusao(){
  fecharSelecaoConclusaoModal(null);
}

function solicitarSelecaoConclusao(itens, titulo, infoMsg){
  return new Promise(function(resolve){
    selecionarConclusaoResolver = resolve;
    abrirSelecaoConclusaoModal(itens, titulo, infoMsg);

document.getElementById('btnSalvarResposta').onclick = async function(){
  var setRespMsg = function(msg){
    showInlineMsg(document.getElementById('respMsg'), msg);
  };
  if (RESP_MODE === 'concluir'){
    var rnc = document.getElementById('resp_rnc').value;
    var conclChk = document.getElementById('resp_concluida');
    var files = document.getElementById('resp_evid').files;
    var solucoesConc = getSolucoesAtuais();
    var validadasConc = new Set(getAcoesValidadasAtuais().filter(function(idx){ return idx >= 0 && (!Array.isArray(solucoesConc) || idx < solucoesConc.length); }));
    var concluidasPrevias = new Set(getAcoesConcluidasAtuais().filter(function(idx){ return idx >= 0 && (!Array.isArray(solucoesConc) || idx < solucoesConc.length); }));
    var totalNaoValidadas = Array.isArray(solucoesConc) ? Math.max(0, solucoesConc.length - validadasConc.size) : 0;
    var acoesConcluidasConc = [];
    var temNovosArquivos = files && files.length > 0;
    var possuiConcExistente = Array.isArray(ANEXOS_CONCLUSAO) && ANEXOS_CONCLUSAO.length > 0;

    if (!Array.isArray(solucoesConc) || !solucoesConc.length){
      setRespMsg('Nenhum plano de ação disponível para conclusão.');
      return;
    }

    if ((!conclChk || !conclChk.checked) && !possuiConcExistente && !temNovosArquivos){
      setRespMsg('Para concluir a RNC, marque o checkbox e anexe ao menos uma evidência.');
      return;
    }
    if (!conclChk || !conclChk.checked){
      setRespMsg('Para concluir a RNC, marque o checkbox "Ações já foram concluídas".');
      return;
    }
    if (!possuiConcExistente && !temNovosArquivos){
      setRespMsg('Para concluir a RNC, anexe ao menos um arquivo de evidência.');
      return;
    }
    if (temNovosArquivos){
      for (var i=0;i<files.length;i++){
        if (files[i].size > 10*1024*1024){
          setRespMsg('Arquivo acima de 10MB: ' + files[i].name);
          return;
        }
      }
    }
      var anexos = temNovosArquivos ? await readFilesAsBase64(files, 10) : [];
      if (temNovosArquivos){
        // Conclusão: - conc + numeração
        anexos = anexos.map(function(a, idx){
          if (!a || !a.dataBase64) return a;
        var ext = '', n = a.name || '', p = n.lastIndexOf('.');
        if (p > 0) ext = n.substring(p);
        var num = (idx === 0) ? '' : ' ('+(idx+1)+')';
        a.name = (rnc || 'RNC') + ' - conc' + num + ext;
        return a;
      });
    }

    var itensSelecaoConc = Array.isArray(solucoesConc) ? solucoesConc.map(function(sol, idx){
      var jaValidada = validadasConc.has(idx);
      var jaConcluida = concluidasPrevias.has(idx);
      return {
        indice: idx,
        solucao: sol,
        checked: jaValidada || jaConcluida || totalNaoValidadas === 1,
        disabled: jaValidada
      };
    }) : [];

    var selecionadasConc = await solicitarSelecaoConclusao(itensSelecaoConc, 'Selecione as ações concluídas', 'Marque os planos concluídos. Planos já validados estão bloqueados.');
    if (!selecionadasConc){
      setRespMsg('Envio cancelado.');
      return;
    }

    acoesConcluidasConc = selecionadasConc.filter(function(idx){ return !validadasConc.has(idx); });

    if (totalNaoValidadas > 0 && !acoesConcluidasConc.length){
      setRespMsg('Selecione ao menos um plano de ação não validado.');
      return;
    }

    beginGlobalLoading();
    google.script.run
      .withFailureHandler(function(err){
        endGlobalLoading();
        setRespMsg((err && err.message) ? err.message : String(err));
      })
      .withSuccessHandler(function(){
        endGlobalLoading();
        setRespMsg('Evidência enviada. Aguardando validação da Qualidade.');
        setTimeout(function(){ hide('view-responder'); show('view-home'); carregarTabelas(); }, 800);
      })
      .concluirRNC_EnviarEvidencias(TOKEN, rnc, anexos, acoesConcluidasConc);
    return;
  }

  // RESPOSTA normal: - resp
  var rnc = document.getElementById('resp_rnc').value;
  var pq1 = (document.getElementById('pq1').value||'').trim();
  var pq2 = (document.getElementById('pq2').value||'').trim();
  var pq3 = (document.getElementById('pq3').value||'').trim();
  var pq4 = (document.getElementById('pq4').value||'').trim();
  var pq5 = (document.getElementById('pq5').value||'').trim();
  var concluida = !!(document.getElementById('resp_concluida') && document.getElementById('resp_concluida').checked);

  if (pq1.length < 10){
     setRespMsg('Informe o 1º Porquê com ao menos 10 caracteres.');
    return;
  }
  if (pq2.length < 10){
    setRespMsg('Informe o 2º Porquê com ao menos 10 caracteres.');
    return;
  }
  if (pq3.length < 10){
    setRespMsg('Informe o 3º Porquê com ao menos 10 caracteres.');
    return;
  }

  var cont = document.getElementById('solucoesList');
  var rows = cont ? cont.querySelectorAll('.grid-sln') : [];
  var solucoes = [];
  var possuiPlano = false;
  for (var i=0;i<rows.length;i++){
    var ac = rows[i].querySelector('.sln-acao').value.trim();
    var rs = rows[i].querySelector('.sln-resp').value.trim();
    var pr = rows[i].querySelector('.sln-prazo').value.trim();
    if (!ac && !rs && !pr) continue;
        possuiPlano = true;
    if (ac.length < 10){
      setRespMsg('A ação proposta na linha '+(i+1)+' deve ter ao menos 10 caracteres.');
      return;
    }
    if (!rs){
      setRespMsg('Informe o responsável na linha '+(i+1)+'.');
      return;
    }
    if (!pr){
      setRespMsg('Informe o prazo na linha '+(i+1)+' no formato dd/mm/aaaa.');
      return;
    }
    if (!isValidDateBR(pr)){
      setRespMsg('Prazo inválido na linha '+(i+1)+'. Use dd/mm/aaaa.');
      return;
    }
    var prazoDate = parseDateBR(pr);
    if (isWeekendDate(prazoDate)){
      setRespMsg('Prazo na linha '+(i+1)+' não pode cair em fim de semana. Informe uma data útil (segunda a sexta).');
      return;
    }
    solucoes.push({ acao: ac, responsavel: rs, prazo: pr });
  }

  if (!possuiPlano){
    setRespMsg('Informe ao menos uma ação proposta com responsável e prazo.');
    return;
  }

  var files = document.getElementById('resp_evid').files;
  if (concluida && (!files || !files.length)){
    setRespMsg('Para marcar as ações como concluídas, anexe uma evidência.');
    return;
  }
  if (!concluida && files && files.length){
    var confirmouAnexoResposta = await solicitarConfirmacaoAnexoResposta();
    if (!confirmouAnexoResposta){
      setRespMsg('Envio cancelado.');
      return;
    }
  }
  for (var i=0;i<files.length;i++){
    if (files[i].size > 10*1024*1024){
      setRespMsg('Arquivo acima de 10MB: ' + files[i].name);
      return;
    }
  }
  var anexos = await readFilesAsBase64(files, 10);
  var temEvidencia = files && files.length > 0;
  var marcarConclusao = concluida && temEvidencia;
  var acoesConcluidasResp = [];
  if (marcarConclusao){
    if (solucoes.length > 1){
      var itensSelecaoResp = solucoes.map(function(s, idx){ return { indice: idx, solucao: s }; });
      var selecionadasResp = await solicitarSelecaoConclusao(itensSelecaoResp, 'Selecione as ações concluídas', 'Marque quais planos de ação já estão concluídos.');
      if (!selecionadasResp){
        setRespMsg('Envio cancelado.');
        return;
      }
      acoesConcluidasResp = selecionadasResp;
    } else {
      acoesConcluidasResp = [0];
    }

    if (!acoesConcluidasResp.length){
      setRespMsg('Selecione quais ações foram concluídas.');
      return;
    }
  }
  // RESPOSTA: só envia como conclusão (- conc) quando houver checkbox marcada e evidência
  anexos = anexos.map(function(a, idx){
    if (!a || !a.dataBase64) return a;
    var ext = '', n = a.name || '', p = n.lastIndexOf('.');
    if (p > 0) ext = n.substring(p);
    var num = (idx === 0) ? '' : ' ('+(idx+1)+')';
    var sufixo = marcarConclusao ? ' - conc' : ' - resp';
    a.name = (rnc || 'RNC') + sufixo + num + ext;
    return a;
  });

  beginGlobalLoading();
  google.script.run
    .withFailureHandler(function(err){
      endGlobalLoading();
      setRespMsg((err && err.message) ? err.message : String(err));
    })
    .withSuccessHandler(function(){
      endGlobalLoading();
      setRespMsg('Resposta enviada. Aguardando validação da Qualidade.');
      setTimeout(function(){ hide('view-responder'); show('view-home'); carregarTabelas(); }, 800);
    })
    .responderRNC_Salvar(TOKEN, rnc, { pq1:pq1, pq2:pq2, pq3:pq3, pq4:pq4, pq5:pq5, solucoes:solucoes, validarConclusao:marcarConclusao, acoesConcluidas: acoesConcluidasResp }, anexos, marcarConclusao);
};

// ====== Validação da RESPOSTA / CONCLUSÃO ======
function getIndicesConcluidosPendentes(){
  var solucoes = getSolucoesAtuais();
  var validadas = new Set(getAcoesValidadasAtuais().filter(function(idx){ return idx >= 0 && (!Array.isArray(solucoes) || idx < solucoes.length); }));
  var concluidas = new Set(getAcoesConcluidasAtuais().filter(function(idx){ return idx >= 0 && (!Array.isArray(solucoes) || idx < solucoes.length); }));
  var pendentes = [];

  concluidas.forEach(function(idx){
    if (!validadas.has(idx)) pendentes.push(idx);
  });

  return pendentes;
}

function abrirModalValidacaoConclusao(){
  var modal = document.getElementById('validacaoConclusaoModal');
  var list = document.getElementById('validacaoConclusaoList');
  var info = document.getElementById('validacaoConclusaoInfo');
  var err = document.getElementById('validacaoConclusaoError');
  var retornoWrap = document.getElementById('validacaoConclusaoRetornoWrap');
  var retornoField = document.getElementById('validacaoConclusaoRetorno');
  if (!modal) return;
  if (err) err.textContent = '';
  if (retornoField) retornoField.value = '';

  var solucoes = getSolucoesAtuais();
  var concluidasPendentes = getIndicesConcluidosPendentes();
  var validadasSet = new Set(getAcoesValidadasAtuais().filter(function(idx){ return idx >= 0 && (!Array.isArray(solucoes) || idx < solucoes.length); }));
  var pendentesSet = new Set(concluidasPendentes);

  if (info) {
    var baseMsg = concluidasPendentes.length ? 'Selecione as ações concluídas que serão validadas.' : 'Nenhuma ação marcada como concluída para validação.';
    info.textContent = baseMsg;
  }

  if (list) {
    list.innerHTML = '';
    list.dataset.totalConcluidas = concluidasPendentes.length || 0;
    if (!Array.isArray(solucoes) || !solucoes.length) {
      list.innerHTML = '<div class="muted">Nenhum plano de ação cadastrado.</div>';
    } else {
      solucoes.forEach(function(s, idx){
        var row = document.createElement('div');
        row.className = 'pa-validacao-item';
        var id = 'chk-validacao-'+idx;

        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.id = id;
        chk.value = String(idx);

        var statusText = '';
        var statusClass = 'pa-validacao-status';

        if (validadasSet.has(idx)) {
          chk.checked = true;
          chk.disabled = true;
          row.classList.add('pa-validacao-item-disabled');
          statusText = 'Plano já validado';
          statusClass += ' pa-validacao-status-ok';
        } else if (pendentesSet.has(idx)) {
          chk.addEventListener('change', atualizarCampoRetornoValidacao);
          statusText = 'Disponível para validação';
          statusClass += ' pa-validacao-status-pendente';
        } else {
          chk.disabled = true;
          row.classList.add('pa-validacao-item-disabled');
          statusText = 'Aguardando conclusão';
        }

        var lbl = document.createElement('label');
        lbl.setAttribute('for', id);
        lbl.innerHTML = '<div class="pa-validacao-acao">'+esc(s && s.acao || '')+'</div>'+
                        '<div class="pa-validacao-meta">Responsável: '+esc(s && s.responsavel || '-')+' · Prazo: '+esc(s && s.prazo || '-')+'</div>'+
                        '<div class="'+statusClass+'">'+statusText+'</div>';

        row.appendChild(chk);
        row.appendChild(lbl);
        list.appendChild(row);
      });
    }
  }

  if (retornoWrap) retornoWrap.classList.toggle('hidden', concluidasPendentes.length === 0);
  atualizarCampoRetornoValidacao();
  modal.classList.remove('hidden');
}

function fecharModalValidacaoConclusao(){
  var modal = document.getElementById('validacaoConclusaoModal');
  if (modal) modal.classList.add('hidden');
  var err = document.getElementById('validacaoConclusaoError');
  if (err) err.textContent = '';
}

function atualizarCampoRetornoValidacao(){
  var list = document.getElementById('validacaoConclusaoList');
  var wrap = document.getElementById('validacaoConclusaoRetornoWrap');
  if (!list || !wrap) return;
  var total = parseInt(list.dataset.totalConcluidas || '0', 10) || 0;
  var marcadas = 0;
  Array.prototype.forEach.call(list.querySelectorAll('input[type="checkbox"]'), function(chk){
    if (chk && !chk.disabled && chk.checked) marcadas++;
  });
  var deveEsconder = total > 0 && marcadas >= total;
  wrap.classList.toggle('hidden', deveEsconder || total === 0);
}

function validarConclusaoComSelecao(selecionadas, retornoMsg){
  var rnc  = (document.getElementById('btnValidarResp2') && document.getElementById('btnValidarResp2').dataset.rnc) || document.getElementById('resp_rnc').value;
  var msgEl = document.getElementById('qualidadeMsgResp2');
  if (!rnc) return;

  beginGlobalLoading();
  google.script.run
    .withFailureHandler(function(err){
      endGlobalLoading();
      if (msgEl) msgEl.textContent = (err && err.message) ? err.message : String(err);
    })
    .withSuccessHandler(function(res){
      endGlobalLoading();
      if (msgEl) {
        msgEl.textContent = (res && res.etapa === 'Aguardando conclusão') ? 'Ações validadas. Próximo plano registrado.' : 'Conclusão validada.';
      }
      setTimeout(function(){ hide('view-responder'); show('view-home'); carregarTabelas(); }, 700);
    })
    .validarConclusao(TOKEN, rnc, Array.isArray(selecionadas) ? selecionadas : [], retornoMsg || '');
}

function confirmarValidacaoConclusao(){
  var list = document.getElementById('validacaoConclusaoList');
  var err = document.getElementById('validacaoConclusaoError');
  var retornoField = document.getElementById('validacaoConclusaoRetorno');
  var totalConcluidas = parseInt(list && list.dataset ? list.dataset.totalConcluidas || '0' : '0', 10) || 0;
  var selecionadas = [];
  if (list){
    Array.prototype.forEach.call(list.querySelectorAll('input[type="checkbox"]'), function(chk){
      if (chk && !chk.disabled && chk.checked){
        var n = parseInt(chk.value, 10);
        if (!isNaN(n)) selecionadas.push(n);
      }
    });
  }

  if (totalConcluidas > 0 && !selecionadas.length){
    if (err) err.textContent = 'Selecione ao menos uma ação para validar.';
    return;
  }

  var retornoMsg = retornoField ? (retornoField.value || '').trim() : '';
  if (totalConcluidas > 0 && selecionadas.length < totalConcluidas && !retornoMsg){
    if (err) err.textContent = 'Descreva os pontos pendentes para os planos não validados.';
    return;
  }

  fecharModalValidacaoConclusao();
  validarConclusaoComSelecao(selecionadas, retornoMsg);
}

if (btnValidarResp2) btnValidarResp2.onclick = function(){

    if (msgEl) msgEl.textContent = 'Esta RNC possui possível reincidência. Classifique a análise de reincidência antes de validar a resposta.';
    return;
  }
  beginGlobalLoading();

  var runner = google.script.run
    .withFailureHandler(function(err){
      endGlobalLoading();
      if (msgEl) msgEl.textContent = (err && err.message) ? err.message : String(err);
    })
    .withSuccessHandler(function(){
      endGlobalLoading();
      if (msgEl) msgEl.textContent = 'Resposta validada.';
      setTimeout(function(){ hide('view-responder'); show('view-home'); carregarTabelas(); }, 700);
    });

  runner.validarResposta(TOKEN, rnc);
};

function textoEtiquetaReincidencia(valor){
  if (valor === 'Não') return 'Análise de reincidência: Não';
  if (valor === 'Provável') return '⚠ Reincidência provável';
  if (valor === 'Sim') return '⚠ Reincidência';
  if (valor === 'Possível reincidência') return '⚠ Possível reincidência';
  return '';
}

function atualizarEtiquetaReincidencia(valor, etapa){
  var btn = document.getElementById('btnValidarResp2');
  valor = String(valor || '').trim();
  if (btn) btn.dataset.reincidencia = valor;
  var podeClassificar = RESP_MODE === 'resposta' && etapa === 'Validação resposta' && isUserQualidade();
  var texto = textoEtiquetaReincidencia(valor);
  var exibirInformativa = !!texto && valor !== 'Não';
  var exibirConstatacao = RESP_MODE === 'abertura' && etapa === 'Validação abertura' && exibirInformativa;
  var exibirResposta = RESP_MODE !== 'abertura' && etapa !== 'Abertura';

  [
    { id: 'reincidenciaTagConstatacao', exibir: exibirConstatacao, clicavel: false },
    { id: 'reincidenciaTagResposta', exibir: exibirResposta && exibirInformativa, clicavel: false },
    { id: 'reincidenciaTagValidacaoResposta', exibir: exibirResposta && (podeClassificar || exibirInformativa), clicavel: podeClassificar }
  ].forEach(function(config){
    var tag = document.getElementById(config.id);
    if (!tag) return;
    tag.textContent = texto;
    tag.dataset.valor = valor;
    tag.disabled = !config.clicavel;
    tag.classList.toggle('hidden', !config.exibir);
  });
}

function fecharClassificarReincidencia(){
  var modal = document.getElementById('classificarReincidenciaModal');
  if (modal) modal.classList.add('hidden');
}

['reincidenciaTagConstatacao','reincidenciaTagResposta','reincidenciaTagValidacaoResposta'].forEach(function(id){
  var tag = document.getElementById(id);
  if (tag) tag.onclick = function(){
    if (this.disabled) return;
    var select = document.getElementById('classificacaoReincidencia');
    if (select) select.value = ['Não', 'Provável', 'Sim'].indexOf(this.dataset.valor) !== -1 ? this.dataset.valor : '';
    document.getElementById('classificarReincidenciaMsg').textContent = '';
    document.getElementById('classificarReincidenciaModal').classList.remove('hidden');
  };
});

var btnSalvarClassificarReincidencia = document.getElementById('btnSalvarClassificarReincidencia');
if (btnSalvarClassificarReincidencia) btnSalvarClassificarReincidencia.onclick = function(){
  var classificacao = document.getElementById('classificacaoReincidencia').value;
  var rnc = document.getElementById('btnValidarResp2').dataset.rnc;
  var msg = document.getElementById('classificarReincidenciaMsg');
  if (!classificacao) { msg.textContent = 'Selecione uma classificação.'; return; }
  google.script.run
    .withFailureHandler(function(err){ msg.textContent = (err && err.message) ? err.message : String(err); })
    .withSuccessHandler(function(res){
      atualizarEtiquetaReincidencia(res.classificacao, 'Validação resposta');
      fecharClassificarReincidencia();
    })
    .classificarReincidencia(TOKEN, rnc, classificacao);
};

/* ================== VISUALIZAR ================== */
function abrirVisualizar(rnc, ano, mes){
  beginGlobalLoading();
  hide('view-home'); hide('view-criar'); hide('view-responder'); show('view-visualizar');
  var splitEl = document.querySelector('#view-visualizar .split');
  if (splitEl) splitEl.classList.add('print-left-only');

  // Limpa campos
  ['vis_rnc','vis_pv','vis_op','vis_origem','vis_fornecedor','vis_responsavel','vis_descricao','vis_motivo','vis_disposicao','vis_descCorrecao','vis_dataAbertura','vis_dataResposta','vis_pq1','vis_pq2','vis_pq3','vis_pq4','vis_pq5'].forEach(function(id){
    var el = document.getElementById(id);
    if (!el) return;
    if (el.tagName==='TEXTAREA') el.value=''; else el.value='';
  });
  document.getElementById('vis_aberturaAnexos').innerHTML = '—';
  var body = document.getElementById('visRespBody'); if (body) body.classList.add('hidden');
  var empty = document.getElementById('visRespEmpty'); if (empty) empty.classList.remove('hidden');
  var slCont = document.getElementById('vis_solucoesList'); if (slCont) slCont.innerHTML = '';
  var respAx = document.getElementById('vis_respAnexosResposta'); if (respAx) respAx.innerHTML = '—';
  var concAx = document.getElementById('vis_respAnexosConclusao'); if (concAx) concAx.innerHTML = '—';
  var respAxLbl = document.getElementById('vis_respAnexosRespostaLabel'); if (respAxLbl) respAxLbl.textContent = 'Evidências de resposta';
  var concAxLbl = document.getElementById('vis_respAnexosConclusaoLabel'); if (concAxLbl) concAxLbl.textContent = 'Evidências de conclusão';
  var concAxBox = document.getElementById('vis_respAnexosConclusaoBox'); if (concAxBox) concAxBox.classList.remove('hidden');
  var visImpBox = document.getElementById('vis_improcedenteBox'); if (visImpBox) visImpBox.classList.add('hidden');
  var visImpTxt = document.getElementById('vis_motivoImprocedente'); if (visImpTxt) visImpTxt.value = '';
  var visCausaSec = document.getElementById('vis_causaRaizSection'); if (visCausaSec) visCausaSec.classList.remove('hidden');
  var visSolTitle = document.getElementById('vis_solucoesTitle'); if (visSolTitle) visSolTitle.textContent = 'SOLUÇÃO';
  atualizarEtiquetaReincidenciaVisualizar('', false);

  google.script.run
    .withFailureHandler(function(err){
      endGlobalLoading();
      var ax = document.getElementById('vis_aberturaAnexos');
      if (ax) ax.textContent = (err && err.message) ? err.message : String(err);
    })
    .withSuccessHandler(function(res){
      endGlobalLoading();
      var d = res && res.dados ? res.dados : {};
      var anex = Array.isArray(res.anexos) ? res.anexos : [];

      // Separa anexos
      var partes = splitAnexosPorTipo(anex);
      var abert = partes.abertura;
      var respA = partes.resposta;
      var concA = partes.conclusao;
      var improcA = partes.improcedente;

      // Render evidências
      document.getElementById('vis_aberturaAnexos').innerHTML = renderLinks(abert);
      document.getElementById('vis_respAnexosResposta').innerHTML = renderLinks(respA);
      document.getElementById('vis_respAnexosConclusao').innerHTML = renderLinks(concA);

      // Bloco de abertura
      document.getElementById('vis_rnc').value = d.rncId || rnc || '';
      document.getElementById('vis_dataAbertura').value = res.dataAbertura || '';
      document.getElementById('vis_pv').value = d.pv || '';
      document.getElementById('vis_op').value = d.op || '';
      document.getElementById('vis_origem').value = d.origem || '';
      document.getElementById('vis_fornecedor').value = d.fornecedor || '';
      document.getElementById('vis_responsavel').value = d.responsavel || '';
      document.getElementById('vis_descricao').value = d.descricao || '';
      document.getElementById('vis_motivo').value = d.motivo || '';
      document.getElementById('vis_disposicao').value = d.disposicao || '';
      document.getElementById('vis_descCorrecao').value = d.descricaoAcaoCorretiva || '';
      autoResizeTextarea(document.getElementById('vis_descricao'));
      autoResizeTextarea(document.getElementById('vis_descCorrecao'));

      // Bloco de resposta (exibe apenas se houver)
      var r = d.resposta || null;
      atualizarEtiquetaReincidenciaVisualizar(res && res.reincidencia, !!r);
      if (splitEl) splitEl.classList.toggle('print-left-only', !r);
      if (r){
        if (body) body.classList.remove('hidden');
        if (empty) empty.classList.add('hidden');

        document.getElementById('vis_dataResposta').value = fmtDateOnly(r.dataRespostaIso) || '';

        var motivoImprocedente = String(r.motivoImprocedente || '').trim();
        var isImprocedente = !!motivoImprocedente || String(r.tipo || '').toLowerCase() === 'improcedente';
        if (respAxLbl) respAxLbl.textContent = isImprocedente ? 'Evidências de improcedência' : 'Evidências de resposta';
        if (concAxBox) concAxBox.classList.toggle('hidden', isImprocedente);
        if (respAx) respAx.innerHTML = renderLinks(isImprocedente ? improcA : respA);
        if (concAx) concAx.innerHTML = renderLinks(concA);
        if (visImpBox) visImpBox.classList.toggle('hidden', !isImprocedente);
        if (visCausaSec) visCausaSec.classList.toggle('hidden', isImprocedente);
        if (visSolTitle) visSolTitle.textContent = isImprocedente ? 'IMPROCEDÊNCIA' : 'SOLUÇÃO';
        if (visImpTxt) {
          visImpTxt.value = motivoImprocedente || 'Sem motivo informado.';
          autoResizeTextarea(visImpTxt);
        }

        var porques = Array.isArray(r.porques) ? r.porques : [r.pq1, r.pq2, r.pq3, r.pq4, r.pq5];
        ['vis_pq1','vis_pq2','vis_pq3','vis_pq4','vis_pq5'].forEach(function(id, i){
          var el = document.getElementById(id); if (el) { el.value = isImprocedente ? '' : (porques[i] || ''); autoResizeTextarea(el); }
        });

        var c = document.getElementById('vis_solucoesList');
        if (c){
          c.innerHTML = '';
          if (isImprocedente){
            c.innerHTML = '<div class="muted">Resposta marcada como improcedente.</div>';
          } else if (Array.isArray(r.solucoes) && r.solucoes.length){
            r.solucoes.forEach(function(s){
              var row = document.createElement('div');
              row.className = 'grid-sln';
              row.innerHTML =
                '<div><label>Ação proposta</label><textarea class="autoresize" readonly rows="4">'+esc(s.acao||'')+'</textarea></div>'+
                '<div class="grid-sln-meta">'+
                  '<div><label>Responsável</label><input type="text" readonly value="'+esc(s.responsavel||'')+'"></div>'+
                  '<div><label>Prazo</label><input type="text" readonly value="'+esc(s.prazo||'')+'"></div>'+
                '</div>';
              c.appendChild(row);
              autoResizeWithin(row);
            });
          } else {
            c.innerHTML = '<div class="muted">—</div>';
          }
        }

        // força Porquês empilhados
        forceStackedVisPorques();
      } else {
        if (body) body.classList.add('hidden');
        if (empty) empty.classList.remove('hidden');
      }
    })
    .obterRNC(TOKEN, rnc, ano, mes);
}

function atualizarEtiquetaReincidenciaVisualizar(valor, temResposta){
  var tag = document.getElementById('visReincidenciaTag');
  if (!tag) return;
  valor = String(valor || '').trim();
  var texto = textoEtiquetaReincidencia(valor);
  tag.textContent = texto;
  tag.classList.toggle('hidden', !temResposta || !texto || valor === 'Não');
}

/* ================== Linhas dinâmicas de Soluções ================== */
function resetSolucoes(){
  var c = document.getElementById('solucoesList');
  if (c) c.innerHTML = '';
}

function addSlnRow(){
  var c = document.getElementById('solucoesList');
  if (!c) return;

  var row = document.createElement('div');
  row.className = 'grid-sln';

  row.innerHTML =
    '<div><label>Ação proposta</label><textarea class="sln-acao autoresize" rows="4" placeholder="Descreva a ação"></textarea></div>'+
    '<div class="grid-sln-meta">'+
      '<div><label>Responsável</label><input type="text" class="sln-resp" placeholder="Nome"></div>'+
      '<div><label>Prazo</label><input type="text" class="sln-prazo" placeholder="dd/mm/aaaa"></div>'+
    '</div>';

  c.appendChild(row);

  var ac = row.querySelector('.sln-acao');
  var pr = row.querySelector('.sln-prazo');

  if (ac){
    autoResizeTextarea(ac);
    ac.addEventListener('input', function(){
      // autoresize
      autoResizeTextarea(ac);

      // se é a última linha e começou a digitar, cria outra
      var rows = c.querySelectorAll('.grid-sln');
      var isLast = rows.length && rows[rows.length-1] === row;
      if (isLast && ac.value.trim().length > 0 && !ac.readOnly){
        addSlnRow();
      }
    });
  }
  if (pr){
    pr.addEventListener('input', function(){
      pr.value = maskDateInput(pr.value);
    });
  }
}

</script>
