<!-- CRIAR / CORRIGIR -->
<div id="view-criar" class="card hidden">
  <div class="header-3col">
    <div class="left"><button class="btn-grey" id="btnVoltar">← Voltar</button></div>
    <h1 id="tituloCriar">Criar RNC</h1><div></div>
  </div>

  <div class="split">
    <!-- Painel ESQUERDO: formulário de abertura/correção -->
    <div class="panel" style="margin-top:0">
            <div id="retornoMsgCriar" class="retorno-msg hidden"></div>
      <h2 style="margin-top:0">CONSTATAÇÃO</h2>
      <div class="row">
        <!-- 1ª linha: RNC + Data -->
        <div class="col-6">
          <label>RNC</label>
          <input id="rncCriar" readonly placeholder="Gerado ao salvar">
        </div>
        <div class="col-6">
          <label>Data de abertura</label>
          <input id="dtAbertura" readonly>
        </div>

        <!-- 2ª linha: PV, OP -->
        <div class="col-6">
          <label>PV</label>
          <input id="pv" placeholder="Ex.: 24198" inputmode="numeric" maxlength="5">
          <small>Somente 5 dígitos (xxxxx).</small>
        </div>
        <div class="col-6">
          <label>OP</label>
          <input id="op" placeholder="Ex.: 12345 ou 12345/01" maxlength="8">
          <small>5 dígitos (xxxxx) ou xxxxx/xx.</small>
        </div>

        <!-- 3ª linha: Origem, Fornecedor, Responsável -->
        <div class="col-4">
          <label>Origem da não conformidade</label>
          <select id="origem">
            <option value="">— selecione —</option>
            <option>Processo</option>
            <option>Reclamação de cliente</option>
            <option>Indicador</option>
            <option>Auditoria 5S</option>
            <option>Fornecedor externo</option>
          </select>
        </div>
        <div class="col-4">
          <label>Fornecedor</label>
          <select id="fornecedor">
            <option value="">— selecione —</option>
          </select>
        </div>
        <div class="col-4">
          <label>Responsável</label>
          <input id="responsavel" placeholder="Responsável pela identificação da NC." required>
        </div>

        <!-- 4ª linha: Motivo -->
        <div class="col-12">
          <label>Motivo</label>
          <select id="motivo">
            <option value="">— selecione —</option>
          </select>
        </div>

        <!-- 5ª linha: Descrição -->
        <div class="col-12">
          <label>Descrição da não conformidade</label>
          <textarea id="descricao" class="autoresize" rows="2" placeholder="Insira aqui o máximo de informações possíveis sobre a NC encontrada"></textarea>
          <small>Mínimo de 20 caracteres.</small>
        </div>

        <!-- Anexos -->
        <div class="col-12">
          <label>Anexos (opcional)</label>
          <input id="anexos" type="file" multiple>
          <small>Qualquer extensão. Você pode selecionar vários arquivos.</small>
        </div>
      </div>

      <h2>CORREÇÃO</h2>
      <div class="row">
        <div class="col-6">
          <label>Disposição (ação imediata)</label>
          <select id="disposicao">
            <option value="">— selecione —</option>
            <option>Retrabalhar / Reparar</option>
            <option>Rejeitar / Paralisar atividade</option>
            <option>Outros</option>
          </select>
        </div>
        <div class="col-12">
          <label>Descrição da ação corretiva</label>
          <textarea id="descCorrecao" class="autoresize" rows="2" placeholder="Insira neste campo o que foi feito para continuar o processo"></textarea>
          <small>Mínimo de 10 caracteres.</small>
        </div>

        <div class="col-12" style="margin-top:8px">
          <button class="btn" id="btnEnviar">Enviar</button>
          <span id="msgCriar" class="muted msg hidden" style="display:none"></span>
        </div>
      </div>
    </div>

    <!-- Painel DIREITO vazio apenas para manter meia página -->
    <div class="panel" style="margin-top:0; visibility:hidden"></div>
  </div>
</div>
